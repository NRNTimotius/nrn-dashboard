/* ===== LAPORAN BULANAN (gabungan) ===== */
let lapReport = null;

/* ══════════ ANALISA LINTAS BRAND (khusus dashboard BOD) ══════════
   Membandingkan 4 brand di bulan yang sama. Nilai utamanya: memisahkan
   masalah SISTEMIK (kena semua brand → kemungkinan faktor platform/pasar)
   dari masalah BRAND-SPECIFIC (cuma 1 brand → eksekusi brand itu). */
const XB = { gapConv:15, gapER:1.5, konsentrasi:60, systemic:0.6 };

// Metrik ringkas per brand untuk dibandingkan
function xbMetrics(D){
  const agT=D.ag.length;
  const tot=D.inqMonth.length;                 // inquiry MASUK bulan laporan
  const pipe=D.inqPipeline;                    // pipeline berjalan (semua bulan)
  return {
    brand:      D.brand,
    doneRate:   agT ? D.agDone/agT*100 : null,
    agT:        agT,
    overdueN:   D.ag.filter(x=>D.agLabel(x.status)!=='Done' && x.sisaHari!=null && x.sisaHari<0).length,
    reachDelta: D.sp.reach ? (D.so.reach-D.sp.reach)/D.sp.reach*100 : null,
    reach:      D.so.reach,
    posts:      D.so.posts||0,
    er:         D.so.er || null,
    erDelta:    (D.so.er && D.sp.er) ? D.so.er-D.sp.er : null,
    conv:       tot ? D.inqDealMo.length/tot*100 : null,
    inqTot:     tot,
    pipeN:      pipe.length,
    pipeRp:     pipe.reduce((s,x)=>s+(x.nominal||0),0),
    dealRp:     D.inqDealMo.reduce((s,x)=>s+(x.nominal||0),0),
    est:        D.bCur.est, proj:D.bCur.proj, act:D.bCur.act,
    serapan:    D.bCur.proj ? D.bCur.act/D.bCur.proj*100 : null,
    aktualKosong: !!D.bCur.proj && !D.bCur.act,
    kosong:     !agT && !D.so.reach && !tot && !pipe.length && !D.bCur.proj,
  };
}

// L = [{D, R(buildInsight), M(xbMetrics)}], month = bulan laporan
function buildCrossInsight(L, month){
  const S=[], W=[], A=[];
  const put=(g,scope,txt)=>g.push({scope,txt});
  const ada = L.filter(x=>!x.M.kosong);
  const has = (k) => ada.filter(x=>x.M[k]!=null);
  const best=(k,arr)=>arr.slice().sort((a,b)=>b.M[k]-a.M[k])[0];
  const worst=(k,arr)=>arr.slice().sort((a,b)=>a.M[k]-b.M[k])[0];

  /* ── Kelengkapan data ── */
  const kosong = L.filter(x=>x.M.kosong);
  if(kosong.length)
    put(A,'Data',`<b>${kosong.length} brand belum ada data ${insEsc(month)}</b> sama sekali: ${kosong.map(x=>insEsc(x.M.brand)).join(', ')}. Laporan portfolio belum utuh.`);
  if(!ada.length){ return {sudah:S,perhatian:W,aksi:A}; }

  /* ── Sistemik vs brand-specific: Reach ── */
  const rd = has('reachDelta');
  if(rd.length >= 2){
    const turun = rd.filter(x=>x.M.reachDelta < 0);
    const rasio = turun.length / rd.length;
    if(rasio >= XB.systemic && turun.length >= 2)
      put(A,'Sosmed',`<b>Reach turun di ${turun.length}/${rd.length} brand</b> — pola serempak, kemungkinan faktor platform/musiman, bukan salah eksekusi satu brand. Perlu strategi konten level holding.`);
    else if(turun.length === 1)
      put(W,'Sosmed',`Reach turun hanya di <b>${insEsc(turun[0].M.brand)}</b> (${Math.round(turun[0].M.reachDelta)}%) sementara brand lain naik — isu spesifik brand itu, bukan platform.`);
    else if(!turun.length)
      put(S,'Sosmed',`Reach naik di semua ${rd.length} brand yang ada datanya — momentum portfolio positif.`);
  }

  /* ── Sistemik vs brand-specific: ER ── */
  const ed = has('erDelta');
  if(ed.length >= 2){
    const turun = ed.filter(x=>x.M.erDelta <= -0.3);
    if(turun.length/ed.length >= XB.systemic && turun.length >= 2)
      put(W,'Sosmed',`ER turun di ${turun.length}/${ed.length} brand — engagement melemah menyeluruh, evaluasi format konten lintas brand.`);
  }

  /* ── Gap ER antar brand ── */
  const er = has('er');
  if(er.length >= 2){
    const b=best('er',er), w=worst('er',er);
    if(b.M.er - w.M.er >= XB.gapER)
      put(W,'Sosmed',`Jarak ER lebar: <b>${insEsc(b.M.brand)} ${b.M.er.toFixed(2)}%</b> vs <b>${insEsc(w.M.brand)} ${w.M.er.toFixed(2)}%</b> (beda ${(b.M.er-w.M.er).toFixed(2)}pp). Cek apa yang dilakukan ${insEsc(b.M.brand)} dan tiru ke ${insEsc(w.M.brand)}.`);
  }

  /* ── Gap konversi antar brand ── */
  const cv = has('conv');
  if(cv.length >= 2){
    const b=best('conv',cv), w=worst('conv',cv);
    if(b.M.conv - w.M.conv >= XB.gapConv)
      put(A,'Inquiry',`Jarak konversi lebar: <b>${insEsc(b.M.brand)} ${Math.round(b.M.conv)}%</b> (${b.M.inqTot} inquiry) vs <b>${insEsc(w.M.brand)} ${Math.round(w.M.conv)}%</b> (${w.M.inqTot} inquiry) — beda ${Math.round(b.M.conv-w.M.conv)}pp. Sales process ${insEsc(w.M.brand)} perlu dibedah.`);
    else
      put(S,'Inquiry',`Konversi antar brand relatif rata (${Math.round(w.M.conv)}%–${Math.round(b.M.conv)}%) — tidak ada brand yang tertinggal jauh.`);
  }

  /* ── Anggaran portfolio ── */
  const tProj=ada.reduce((s,x)=>s+x.M.proj,0), tAct=ada.reduce((s,x)=>s+x.M.act,0), tEst=ada.reduce((s,x)=>s+x.M.est,0);
  if(tProj){
    const sp = tAct/tProj*100;
    if(sp > INS.overspend)      put(A,'Anggaran',`Portfolio overspend: aktual ${fmtRp(tAct)} = <b>${Math.round(sp)}% dari proyeksi</b> ${fmtRp(tProj)}.`);
    else if(sp < INS.underspend) put(W,'Anggaran',`Serapan portfolio baru ${Math.round(sp)}% (${fmtRp(tAct)} dari ${fmtRp(tProj)}) — banyak rencana belum jalan.`);
    else                         put(S,'Anggaran',`Serapan portfolio sehat di ${Math.round(sp)}% (${fmtRp(tAct)} dari ${fmtRp(tProj)}).`);
    // Konsentrasi anggaran
    const top = best('proj',ada);
    const share = top.M.proj/tProj*100;
    if(share >= XB.konsentrasi)
      put(W,'Anggaran',`<b>${Math.round(share)}% anggaran portfolio terpusat di ${insEsc(top.M.brand)}</b> (${fmtRp(top.M.proj)} dari ${fmtRp(tProj)}) — cek apakah alokasi ini disengaja.`);
  }
  const noEst = ada.filter(x=>!x.M.est && x.M.proj);
  if(noEst.length)
    put(A,'Anggaran',`${noEst.length} brand jalan tanpa Budget Estimasi: ${noEst.map(x=>insEsc(x.M.brand)).join(', ')} — estimasi terlewat saat bikin agenda.`);
  const noAkt = ada.filter(x=>x.M.aktualKosong);
  if(noAkt.length)
    put(W,'Anggaran',`<b>Biaya aktual belum terupdate di ${noAkt.length} brand</b>: ${noAkt.map(x=>insEsc(x.M.brand)).join(', ')} — angka serapan portfolio di atas belum mencerminkan kenyataan.`);

  /* ── Eksekusi agenda antar brand ── */
  const dr = has('doneRate');
  if(dr.length >= 2){
    const b=best('doneRate',dr), w=worst('doneRate',dr);
    if(w.M.doneRate < INS.doneLow)
      put(A,'Agenda',`<b>${insEsc(w.M.brand)} paling tertinggal</b>: ${Math.round(w.M.doneRate)}% agenda Done (${w.M.agT} agenda), sementara ${insEsc(b.M.brand)} ${Math.round(b.M.doneRate)}%.`);
    else if(b.M.doneRate >= INS.doneGood)
      put(S,'Agenda',`Eksekusi terbaik: <b>${insEsc(b.M.brand)}</b> ${Math.round(b.M.doneRate)}% agenda Done.`);
  }

  /* ── Pipeline & deal portfolio ── */
  const tPipe=ada.reduce((s,x)=>s+x.M.pipeRp,0), tDeal=ada.reduce((s,x)=>s+x.M.dealRp,0);
  if(tPipe) put(S,'Inquiry',`Pipeline portfolio ${fmtRp(tPipe)} masih berjalan; deal masuk ${fmtRp(tDeal)} bulan ini.`);

  /* ── Brand yang paling butuh perhatian ── */
  const rank = L.slice().sort((a,b)=>b.R.aksi.length-a.R.aksi.length);
  if(rank[0] && rank[0].R.aksi.length >= 3)
    put(A,'Prioritas',`<b>${insEsc(rank[0].M.brand)} paling butuh perhatian</b> — ${rank[0].R.aksi.length} item butuh aksi (terbanyak di portfolio). Urutan berikutnya: ${rank.slice(1,3).map(x=>insEsc(x.M.brand)+' ('+x.R.aksi.length+')').join(', ')}.`);
  const bersih = L.filter(x=>!x.R.aksi.length && !x.M.kosong);
  if(bersih.length)
    put(S,'Prioritas',`${bersih.length} brand tanpa item mendesak: ${bersih.map(x=>insEsc(x.M.brand)).join(', ')} — bisa jadi acuan praktik baik.`);

  return {sudah:S, perhatian:W, aksi:A};
}

/* Alias supaya blok helper bersama memanggil fungsi yang benar di app ini.
   Catatan: di dashboard statusPill = pill AGENDA, inqPill = pill INQUIRY. */
const lapAgLabel = statusLabel, lapAgPill = statusPill;
const lapInqPill = inqPill,     lapInqKey = inqKey;

/* ══════════ POTONGAN TAMPILAN LAPORAN (dipakai layar & PDF) ══════════
   Blok identik di nrn-inquiry-form & nrn-dashboard — ubah di dua-duanya.
   Memakai alias lapAgLabel/lapAgPill/lapInqPill/lapInqKey karena nama asli
   fungsi pill berbeda di tiap app (statusPill = agenda di dashboard,
   tapi = inquiry di Brand Needs). */

// Kalimat penjelas anggaran — bahasa manusia, bukan cuma angka.
function lapAnggaranNote(R, month, nextM){
  const b=R.bCur, t=[];
  if(!b.est&&!b.proj&&!b.act) t.push('Belum ada data anggaran untuk bulan ini.');
  else {
    if(!b.est&&b.proj) t.push('<b>Budget Estimasi belum diisi</b>, jadi rencana '+fmtRp(b.proj)+' tidak punya pembanding.');
    if(b.proj&&!b.act) t.push('<b>Biaya aktual belum terupdate</b> — belum ada realisasi tercatat. Kalau sudah ada pengeluaran, minta tim mencatatnya di Trello.');
    else if(b.act&&b.proj&&b.act>b.proj) t.push('<b>Aktual melebihi rencana</b> sebesar '+fmtRp(b.act-b.proj)+' ('+Math.round(b.act/b.proj*100)+'% dari rencana) — perlu dipertanyakan.');
    else if(b.act&&b.proj) t.push('Terpakai '+Math.round(b.act/b.proj*100)+'% dari rencana; sisa '+fmtRp(Math.max(0,b.proj-b.act))+'.');
    else if(b.act&&!b.proj) t.push('Ada pengeluaran '+fmtRp(b.act)+' tanpa rencana tercatat.');
  }
  if(!R.bNext.proj) t.push('Rencana '+nextM+' belum ada.');
  t.push('<b>Estimasi</b> = patokan awal dari deskripsi card · <b>Proyeksi</b> = rencana terkini dari nominal di checklist · <b>Aktual</b> = realisasi.');
  return '<div class="note">'+t.join(' ')+'</div>';
}

// Efisiensi konten: reach & interaksi per post
function lapEfisiensi(R){
  const so=R.so, sp=R.sp;
  if(!so.posts) return '<div class="note">Belum ada konten tercatat di bulan ini.</div>';
  const eng=(so.likes||0)+(so.comments||0)+(so.shares||0)+(so.saves||0);
  const engP=(sp.likes||0)+(sp.comments||0)+(sp.shares||0)+(sp.saves||0);
  const per=(v,n)=>n?Math.round(v/n):0;
  const cmp=(c,p)=>{ if(!p) return ''; const d=Math.round((c-p)/p*100);
    return ` <span style="color:${d>=0?'var(--green4)':'var(--red)'};font-size:11px">${d>=0?'▲':'▼'} ${Math.abs(d)}%</span>`; };
  return `<div class="kpis" style="margin-top:8px">
    <div class="kpi"><h3>Reach / konten</h3><div class="v num">${fmtNum(per(so.reach,so.posts))}${cmp(per(so.reach,so.posts),per(sp.reach,sp.posts))}</div></div>
    <div class="kpi"><h3>Interaksi / konten</h3><div class="v num">${fmtNum(per(eng,so.posts))}${cmp(per(eng,so.posts),per(engP,sp.posts))}</div></div>
    <div class="kpi"><h3>Views / konten</h3><div class="v num">${fmtNum(per(so.views,so.posts))}${cmp(per(so.views,so.posts),per(sp.views,sp.posts))}</div></div>
    <div class="kpi"><h3>Total interaksi</h3><div class="v num">${fmtNum(eng)}${cmp(eng,engP)}</div></div>
  </div>
  <div class="note">Efisiensi konten = hasil dibagi jumlah posting. Naiknya angka ini berarti konten makin efektif, bukan sekadar makin banyak.</div>`;
}

// Tabel agenda: yang belum selesai diutamakan (telat → mepet → sisanya)
function lapAgendaTable(R){
  if(!R.ag.length) return '<div class="note">Belum ada agenda di bulan ini.</div>';
  const rank=x=>{ const L=lapAgLabel(x.status); if(L==='Done')return 3;
    if(x.sisaHari!=null&&x.sisaHari<0)return 0; if(x.sisaHari!=null&&x.sisaHari<=INS.dueSoon)return 1; return 2; };
  const rows=R.ag.slice().sort((a,b)=>rank(a)-rank(b)||((a.sisaHari==null?999:a.sisaHari)-(b.sisaHari==null?999:b.sisaHari))).map(x=>{
    const L=lapAgLabel(x.status), r=rank(x);
    const sisa = L==='Done' ? '<span style="color:var(--green4)">✓ Completed</span>'
      : x.sisaHari==null ? '—'
      : x.sisaHari<0 ? `<b style="color:var(--red)">telat ${Math.abs(x.sisaHari)} hari</b>`
      : x.sisaHari<=INS.dueSoon ? `<b style="color:var(--amber)">${x.sisaHari} hari lagi</b>`
      : `${x.sisaHari} hari lagi`;
    return `<tr class="${r===0?'lap-od':r===1?'lap-soon':''}"><td>${insEsc(x.card)||'—'}</td><td>${insEsc(x.subtask)||'—'}</td>
      <td>${insEsc(x.deadline)||'—'}</td><td>${sisa}</td><td>${lapAgPill(x.status)}</td><td class="muted">${insEsc(x.pic)||'—'}</td></tr>`;
  }).join('');
  return `<div class="tablewrap"><table><thead><tr><th>Card / Agenda</th><th>Task</th><th>Deadline</th><th>Sisa</th><th>Status</th><th>PIC</th></tr></thead><tbody>${rows}</tbody></table></div>
  <div class="note">Diurutkan: lewat deadline dulu, lalu yang mepet (≤${INS.dueSoon} hari), lalu sisanya. Baris merah = telat, kuning = mepet.</div>`;
}

// Tabel inquiry: tanggal masuk, tahap terakhir + kapan, umur, nominal
function lapInqTable(list, kosong){
  if(!list.length) return '<div class="note">'+kosong+'</div>';
  const rows=list.slice().sort((a,b)=>String(b.timestamp||'').localeCompare(String(a.timestamp||''))).map(x=>{
    const st=insLastStep(x);
    const tahap = st ? `${st.nama} <span class="muted">· ${insEsc(st.tgl)}</span>` : '<span class="muted">belum ada tanggal</span>';
    const jalan = ['quotation','sampling'].indexOf(lapInqKey(x.status))>=0;
    const umur = st && st.umur!=null
      ? (jalan && st.umur>INS.quoStale ? `<b style="color:var(--red)">${st.umur} hari</b>` : `${st.umur} hari`)
      : '—';
    const alasan = lapInqKey(x.status)==='cancel' ? (insEsc(x.alasanCancel)||'<span class="muted">tanpa alasan</span>') : '';
    return `<tr><td>${insEsc(String(x.timestamp||'').slice(0,11))||'—'}</td><td>${insEsc(x.customer)||'—'}</td>
      <td>${insEsc(x.product)||'—'}</td><td class="r num">${fmtRp(x.nominal)}</td>
      <td>${lapInqPill(x.status)}</td><td>${tahap}</td><td>${umur}</td>
      <td class="muted">${alasan||insEsc(x.salesPic)||'—'}</td></tr>`;
  }).join('');
  return `<div class="tablewrap"><table><thead><tr><th>Tgl Masuk</th><th>Customer</th><th>Produk</th><th class="r">Nominal</th><th>Status</th><th>Update Terakhir</th><th>Umur</th><th>Alasan / PIC</th></tr></thead><tbody>${rows}</tbody></table></div>
  <div class="note"><b>Update Terakhir</b> = tahap terakhir yang tercatat &amp; tanggalnya · <b>Umur</b> = sudah berapa lama di tahap itu (merah = mengendap &gt;${INS.quoStale} hari).</div>`;
}

// Rakit semua data 1 brand untuk 1 bulan. Dipakai laporan per-brand & portfolio.
function lapBrandData(brand, month, prevM, nextM){
  const sumK=(a,k)=>a.reduce((s,x)=>s+(x[k]||0),0);
  const avgK=(a,k)=>a.length?a.reduce((s,x)=>s+(x[k]||0),0)/a.length:0;

  const ag = ((agendaData&&agendaData.detail)||[]).filter(x=>x.brand===brand && x.bulan===month);
  const agDone=ag.filter(x=>x.status==='Done').length, agProg=ag.filter(x=>x.status==='On Progress').length, agPlan=ag.length-agDone-agProg;

  const mkCur=((mktData&&mktData.rows)||[]).filter(r=>r.brand===brand && r.month===month);
  const mkPrv=((mktData&&mktData.rows)||[]).filter(r=>r.brand===brand && r.month===prevM);
  const soc=a=>({reach:sumK(a,'reach'),views:sumK(a,'views'),follows:sumK(a,'follows'),er:avgK(a,'avgER'),
                 posts:sumK(a,'posts'),likes:sumK(a,'likes'),comments:sumK(a,'comments'),
                 shares:sumK(a,'shares'),saves:sumK(a,'saves'),
                 storyER:a.some(r=>r.storyER!=null)?avgK(a.filter(r=>r.storyER!=null),'storyER'):null});
  const so=soc(mkCur), sp=soc(mkPrv);

  const bud=a=>({est:sumK(a,'est'),proj:sumK(a,'proj'),act:sumK(a,'act')});
  const bCur=bud(((finData&&finData.rows)||[]).filter(r=>r.brand===brand && r.month===month));
  const bNext=bud(((finData&&finData.rows)||[]).filter(r=>r.brand===brand && r.month===nextM));

  const inq=((inqData&&inqData.detail)||[]).filter(x=>x.brand===brand);
  // Inquiry dipisah: MASUK bulan laporan vs pipeline yang MASIH berjalan.
  // timestamp dashboard = 'dd MMM yyyy'
  const yr=(finData&&finData.year)||new Date().getFullYear();
  const mi=MONTHS.indexOf(month);
  const inBulan = x => { const d=new Date(String(x.timestamp||''));
    return !isNaN(d.getTime()) && d.getMonth()===mi && d.getFullYear()===yr; };
  // Cancel dgn alasan data uji dibuang dari SEMUA hitungan & tabel — kalau tidak,
  // ia ikut jadi penyebut konversi dan bikin angkanya menipu.
  const inqMonthRaw=inq.filter(inBulan);
  const inqTestN=inqMonthRaw.filter(insIsTestCancel).length;
  const inqMonth=inqMonthRaw.filter(x=>!insIsTestCancel(x));
  const inqQ=inq.filter(x=>inqKey(x.status)==='quotation');    // pipeline: semua bulan
  const inqS=inq.filter(x=>inqKey(x.status)==='sampling');
  const inqPipeline=inqQ.concat(inqS);
  const inqW=inqMonth.filter(x=>inqKey(x.status)==='deal');    // deal bulan ini
  const inqL=inqMonth.filter(x=>inqKey(x.status)==='cancel');  // cancel alasan wajar

  const agBelum=ag.filter(x=>statusLabel(x.status)!=='Done');
  const agOverdue=agBelum.filter(x=>x.sisaHari!=null&&x.sisaHari<0).sort((a,b)=>a.sisaHari-b.sisaHari);
  const agDueSoon=agBelum.filter(x=>x.sisaHari!=null&&x.sisaHari>=0&&x.sisaHari<=INS.dueSoon).sort((a,b)=>a.sisaHari-b.sisaHari);

  const insData = { brand, month, prevM, nextM, bCur, bNext, so, sp,
    ag, agDone, agProg, agLabel: statusLabel,
    inqMonth, inqPipeline, inqDealMo:inqW, inqCancelMo:inqL, inqTestN,
    inqQuo:inqQ, inqSamp:inqS };

  return { ag, agDone, agProg, agPlan, agBelum, agOverdue, agDueSoon, so, sp, bCur, bNext,
           inq, inqMonth, inqPipeline, inqQ, inqS, inqW, inqL, inqTestN, insData };
}

  lapPortfolio = { month, year, list:L };

  const tReach=L.reduce((s,x)=>s+x.M.reach,0);

  // Sorot nilai terbaik (hijau) & terburuk (merah) per kolom
  const pick=(k,dir)=>{ const v=L.filter(x=>x.M[k]!=null).map(x=>x.M[k]); if(v.length<2) return [null,null];
    return dir>0 ? [Math.max(...v), Math.min(...v)] : [Math.min(...v), Math.max(...v)]; };
  const cell=(val,k,fmt,dir)=>{
    if(val==null) return '<td class="r muted">—</td>';
    const [b,w]=pick(k,dir||1);
    const col = val===b ? 'var(--green4)' : val===w ? 'var(--red)' : '';
    return `<td class="r num" style="${col?'color:'+col+';font-weight:700':''}">${fmt(val)}</td>`;

      <button id="lExcel" class="tab">⬇ Excel</button>
    </div>
    <div id="lap-report">
      <div class="section-title">📄 Laporan Portfolio — Semua Brand · ${month} ${year}</div>

      <div class="brandgrid">
        <div class="bcard"><h3>Anggaran Proyeksi</h3><div class="big" style="font-size:19px">${fmtRp(tProj)}</div><div class="biglbl">Est ${fmtRp(tEst)}</div></div>
        <div class="bcard"><h3>Anggaran Aktual</h3><div class="big" style="font-size:19px">${fmtRp(tAct)}</div><div class="biglbl">${tProj?Math.round(tAct/tProj*100):0}% dari proyeksi</div></div>
        <div class="bcard"><h3>Agenda Done</h3><div class="big">${agDone}/${agTot}</div><div class="biglbl">${agTot?Math.round(agDone/agTot*100):0}% selesai</div></div>
        <div class="bcard"><h3>Total Reach</h3><div class="big" style="font-size:19px">${fmtNum(tReach)}</div><div class="biglbl">Avg ER ${avgER.toFixed(2)}%</div></div>
        <div class="bcard"><h3>Inquiry</h3><div class="big">${inqTot}</div><div class="biglbl">${dealN} deal · ${inqTot?Math.round(dealN/inqTot*100):0}% konversi</div></div>

      </div>

      ${insightBoxHtml('🔀 Analisa Lintas Brand',
         `${month} ${year} — ${X.sudah.length} berjalan baik · ${X.perhatian.length} perlu perhatian · ${X.aksi.length} butuh aksi`,
         X,

function exportPortfolioExcel(){
  if(!lapPortfolio) return;
  const {month, year, list:L} = lapPortfolio;
  const wb=XLSX.utils.book_new();
  const n=v=>v==null?'':Math.round(v*100)/100;
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(L.map(x=>({
    Brand:x.brand, 'Agenda Total':x.M.agT, 'Agenda Done %':n(x.M.doneRate),
    'Reach':x.M.reach, 'Reach Δ %':n(x.M.reachDelta), 'Avg ER %':n(x.M.er),
    'Inquiry':x.M.inqTot, 'Konversi %':n(x.M.conv), 'Pipeline':x.M.pipeRp, 'Deal Rp':x.M.dealRp,
    'Est':x.M.est, 'Proyeksi':x.M.proj, 'Aktual':x.M.act, 'Serapan %':n(x.M.serapan),
    'Butuh Aksi':x.R.aksi.length, 'Perlu Perhatian':x.R.perhatian.length,
  }))), 'Perbandingan');
  const X=buildCrossInsight(L, month);
  const strip=s=>String(s).replace(/<[^>]+>/g,'');
  const flat=(arr,k)=>arr.map(f=>({Kelompok:k, Lingkup:f.scope, Temuan:strip(f.txt)}));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(
    flat(X.sudah,'Sudah jalan').concat(flat(X.perhatian,'Perlu perhatian'), flat(X.aksi,'Butuh aksi'))), 'Analisa Lintas Brand');

    L.flatMap(x=>x.R.aksi.map(f=>({Brand:x.brand, Lingkup:f.scope, Aksi:strip(f.txt)})))), 'Aksi per Brand');

}

    R.inqQ.concat(R.inqW,R.inqL).map(x=>({Customer:x.customer,Produk:x.product,Nominal:x.nominal,Status:x.status,PIC:x.salesPic}))), 'Inquiry');
  XLSX.writeFile(wb, `Laporan_${R.brand}_${R.month}_${R.year}.xlsx`);
}

/* ===== GENERIC GRID (fallback) ===== */
const isNum = s => /^[-+]?(rp\.?\s*)?[\d.,]+%?$/i.test(String(s).trim()) && /\d/.test(String(s));
const isEmptyRow = row => row.every(c => String(c).trim()==='');
const nonEmpty = row => row.filter(c => String(c).trim()!=='').length;

function pillize(s){
  const z = String(s).toLowerCase();
  if(z.includes('deal')) return '<span class="pill deal">'+s+'</span>';
  if(z.includes('cancel')) return '<span class="pill cancel">'+s+'</span>';
  if(z.includes('sampling')) return '<span class="pill sampling">'+s+'</span>';
  if(z.includes('quotation')||z.includes('wait')) return '<span class="pill wait">'+s+'</span>';
  if(z==='done') return '<span class="pill done">'+s+'</span>';
  if(z==='on progress') return '<span class="pill prog">'+s+'</span>';
  if(z==='planned') return '<span class="pill plan">'+s+'</span>';
  return s;
}

function renderGrid(values){
  if(!values || !values.length){ $('#content').innerHTML='<div class="loading">Sheet kosong.</div>'; return; }
  const maxC = Math.max(...values.map(r=>r.length));
  let html = ''; let tableRows = [];

  const flush = () => {
    if(!tableRows.length) return;
    // baris pertama blok = header
    const head = tableRows[0];
    const body = tableRows.slice(1);
    const ths = head.map((c,i)=>`<th class="${isNum(body.find(r=>r[i])? '' : '')||''}">${c||''}</th>`).join('');
    const trs = body.map(r=>'<tr>'+r.map(c=>{
      const v = String(c);
      const cls = isNum(v)?'r num':'';
      return `<td class="${cls}">${pillize(v)}</td>`;
    }).join('')+'</tr>').join('');
    html += `<div class="tablewrap"><table><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table></div>`;
    tableRows = [];
  };

  values.forEach(row => {
    if(isEmptyRow(row)){ flush(); return; }
    const ne = nonEmpty(row);
    const firstCell = String(row.find(c=>String(c).trim()!=='')||'');
    if(ne===1){
      // banner / sub-judul
      flush();
      const big = /DASHBOARD|AGENDA|SUMMARY|RINGKASAN|HOLDING/i.test(firstCell) || firstCell.length>30;
      html += `<div class="${big?'gbanner':'gsub'}">${firstCell}</div>`;
    } else {
      tableRows.push(row.map(c=>String(c)));
    }
  });
  flush();
  $('#content').innerHTML = html || '<div class="loading">Tidak ada data.</div>';
}

async function gateLogin(){
  const pw = $('#gatePw').value;
  const err = $('#gateErr');
  err.className = 'gateErr';
  if(!pw){ err.textContent='Masukkan password.'; err.className='gateErr show'; return; }
  $('#gateBtn').disabled = true; $('#gateBtn').textContent='Memeriksa…';
  try{
    const r = await fetch(APPS_SCRIPT_URL+'?action=getAgenda&password='+encodeURIComponent(pw));
    const d = await r.json();
    if(!d.success){ err.textContent = d.error || 'Password salah.'; err.className='gateErr show'; return; }
    BOD_PW = pw;
    agendaData = d; // sudah kebawa dari login
    sessionStorage.setItem('nrn_bod_pw', pw);
    $('#gate').style.display='none';
    renderTabs(); load();
  }catch(e){
    err.textContent='Gagal terhubung ke server.'; err.className='gateErr show';
  }finally{
    $('#gateBtn').disabled=false; $('#gateBtn').textContent='Masuk →';
  }
}

/* ══════════ TABEL BISA DI-SORT (klik header thead) ══════════
   Delegasi global: klik <th> → urutkan baris <tbody>. Bekerja untuk SEMUA
   tabel data tanpa mengubah tiap fungsi render. Klik lagi = balik arah.
   Baris "Total"/pesan-kosong (punya colspan) tetap menempel di bawah.
   Blok identik di nrn-dashboard & nrn-inquiry-form — ubah di dua-duanya. */
(function(){
  var MON={jan:1,feb:2,mar:3,apr:4,mei:5,may:5,jun:6,jul:7,agu:8,agt:8,aug:8,sep:9,okt:10,oct:10,nov:11,nop:11,des:12,dec:12};
  function txt(td){ return td && td.dataset && td.dataset.sort!=null ? td.dataset.sort : (td ? (td.textContent||'').trim() : ''); }
  function isBlank(s){ s=String(s).trim().toLowerCase(); return s===''||s==='—'||s==='-'||s.indexOf('belum')===0; }
  function toDate(s){
    s=String(s).trim(); var m;
    if((m=s.match(/^(\d{4})-(\d{2})-(\d{2})/)))      return Date.UTC(+m[1],+m[2]-1,+m[3]);
    if((m=s.match(/^(\d{1,2})[\/](\d{1,2})[\/](\d{4})/))) return Date.UTC(+m[3],+m[2]-1,+m[1]);
    if((m=s.match(/^(\d{1,2})\s+([A-Za-z]{3,})\.?\s+(\d{4})/))){ var mm=MON[m[2].slice(0,3).toLowerCase()]; if(mm) return Date.UTC(+m[3],mm-1,+m[1]); }
    return null;
  }
  function toNum(s){
    var t=String(s).replace(/rp\.?/ig,'').replace(/%/g,'').trim();
    var m=t.match(/-?\d[\d.,]*/); if(!m) return null;
    var n=m[0].replace(/\./g,'').replace(',', '.'); var v=parseFloat(n);
    return isNaN(v)?null:v;
  }
  // Nama bulan Indonesia → urut kronologis, bukan alfabetis (Juni sebelum Juli)
  var BULAN={januari:1,februari:2,maret:3,april:4,mei:5,juni:6,juli:7,agustus:8,september:9,oktober:10,november:11,desember:12};
  function toBulan(s){ var v=BULAN[String(s).trim().toLowerCase()]; return v||null; }
  // Tipe kolom dari mayoritas sel non-kosong: 'bulan' | 'date' | 'num' | 'str'
  function colType(rows, i){
    var b=0,d=0,n=0,c=0;
    for(var r=0;r<rows.length;r++){
      var s=txt(rows[r].children[i]); if(isBlank(s)) continue; c++;
      if(toBulan(s)!=null) b++; else if(toDate(s)!=null) d++; else if(toNum(s)!=null) n++;
    }
    if(!c) return 'str';
    if(b/c>=0.6) return 'bulan';
    if(d/c>=0.6) return 'date';
    if(n/c>=0.6) return 'num';
    return 'str';
  }
  function keyOf(s,type){
    if(isBlank(s)) return null;
    if(type==='bulan') return toBulan(s);
    if(type==='date')  return toDate(s);
    if(type==='num')   return toNum(s);
    return String(s).toLowerCase();
  }
  // Baris "penutup" (Total / pesan kosong): ada sel ber-colspan
  function isFooter(tr){
    for(var i=0;i<tr.children.length;i++){ if(tr.children[i].hasAttribute('colspan')) return true; }
    return false;
  }
  function sortTable(table, thIdx, th){
    var tbody=table.tBodies[0]; if(!tbody) return;
    var all=Array.prototype.slice.call(tbody.rows);
    var body=[], foot=[];
    all.forEach(function(r){ (isFooter(r)?foot:body).push(r); });
    if(body.length<2 && foot.length) { /* tetap boleh, tapi 1 baris tak perlu */ }
    var type=colType(body, thIdx);
    // Arah: simpan di dataset table
    var prev=table.getAttribute('data-sort-col');
    var dir = (prev==String(thIdx) && table.getAttribute('data-sort-dir')==='asc') ? 'desc' : 'asc';
    table.setAttribute('data-sort-col', thIdx);
    table.setAttribute('data-sort-dir', dir);
    var sign = dir==='asc' ? 1 : -1;
    body.sort(function(a,b){
      var ka=keyOf(txt(a.children[thIdx]),type), kb=keyOf(txt(b.children[thIdx]),type);
      if(ka==null && kb==null) return 0;
      if(ka==null) return 1;          // kosong selalu di bawah
      if(kb==null) return -1;
      if(ka<kb) return -1*sign;
      if(ka>kb) return 1*sign;
      return 0;
    });
    body.forEach(function(r){ tbody.appendChild(r); });
    foot.forEach(function(r){ tbody.appendChild(r); }); // Total tetap paling bawah
    // Indikator panah di header
    var heads=th.parentNode.children;
    for(var i=0;i<heads.length;i++){ var s=heads[i].querySelector('.sort-ind'); if(s) s.remove(); }
    var ind=document.createElement('span'); ind.className='sort-ind'; ind.textContent = dir==='asc'?' ▲':' ▼';
    th.appendChild(ind);
  }
  document.addEventListener('click', function(e){
    var th=e.target.closest ? e.target.closest('th') : null;
    if(!th) return;
    var thead=th.closest('thead'); if(!thead) return;
    var table=th.closest('table'); if(!table) return;
    if(th.hasAttribute('data-nosort')) return;   // header yg sengaja dikecualikan
    if(th.onclick) return;                        // header yg sudah punya handler sendiri (mis. sort finance lama)
    var row=th.parentNode, idx=Array.prototype.indexOf.call(row.children, th);
    try{ sortTable(table, idx, th); }catch(err){}
  }, false);
})();
</script>
