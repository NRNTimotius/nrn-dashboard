<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NRN — Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
 --green:#233a2c;--green2:#2f4d3a;--green3:#3f6b4a;--green4:#2d6a4f;--green-bg:#e6f1ea;
 --gold:#c8a96e;--gold2:#e8c98e;--gold-bg:#f5ecd8;
 --cream:#f6f2ea;--cream2:#ece5d8;--cream3:#e0d8c8;--white:#fff;
 --red:#9b2226;--red-bg:#f7e3e3;--amber:#7f5000;--amber-bg:#fff0cc;
 --text:#241c12;--text2:#4f4534;--text3:#8a8170;
 --radius:13px;--shadow:0 4px 22px rgba(35,40,30,.10);
}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);-webkit-font-smoothing:antialiased;font-size:14px;line-height:1.5}
.num{font-family:'DM Mono',monospace;font-variant-numeric:tabular-nums}
.header{background:var(--green);padding:18px 30px 0;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;top:-70px;right:-30px;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,rgba(200,169,110,.18),transparent 70%)}
.header-in{max-width:1240px;margin:0 auto;position:relative}
.htop{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.2em;color:var(--gold);text-transform:uppercase;margin-bottom:4px}
.header h1{font-family:'DM Serif Display',serif;font-size:23px;color:#fff;line-height:1.1}
.header h1 em{color:var(--gold2);font-style:normal}
.spacer{flex:1}
.btn{height:34px;padding:0 14px;border:none;border-radius:9px;font-family:inherit;font-size:12.5px;font-weight:600;cursor:pointer}
.btn-gold{background:var(--gold);color:#3a2a10}.btn-gold:hover{background:var(--gold2)}
/* tabs */
.tabs{display:flex;gap:4px;margin-top:14px;flex-wrap:wrap}
.tab{background:transparent;border:0;color:rgba(255,255,255,.6);padding:11px 18px;cursor:pointer;font-family:inherit;font-size:13.5px;font-weight:600;border-radius:10px 10px 0 0;border-bottom:3px solid transparent}
.tab:hover{color:#fff}
.tab.on{background:var(--cream);color:var(--green);border-bottom-color:var(--gold)}
.wrap{max-width:1240px;margin:0 auto;padding:22px 20px 70px}
.section-title{font-family:'DM Serif Display',serif;font-size:18px;color:var(--green);font-weight:400;margin:20px 0 11px}
/* brand cards (agenda) */
.brandgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:13px}
@media(max-width:900px){.brandgrid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:520px){.brandgrid{grid-template-columns:1fr}}
.bcard{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:15px 17px;border-top:3px solid var(--gold)}
.bcard h3{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--green4);font-weight:500;margin-bottom:8px}
.bcard .big{font-family:'DM Serif Display',serif;font-size:29px;color:var(--green);line-height:1}
.bcard .biglbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
.statrow{display:flex;gap:6px;flex-wrap:wrap}
.chip{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px}
.chip.done{background:var(--green-bg);color:var(--green4)}.chip.prog{background:var(--gold-bg);color:var(--amber)}
.chip.plan{background:var(--cream2);color:var(--text2)}.chip.month{background:var(--green);color:#fff}
/* toolbar */
.toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:11px}
.toolbar select{height:36px;padding:0 11px;border-radius:9px;border:1.5px solid var(--cream2);background:var(--cream);color:var(--text);font-size:13px;font-family:inherit}
.toolbar select:focus{outline:none;border-color:var(--green4);background:#fff}
.toolbar .lbl{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--text3)}
.tag{font-size:11px;color:var(--text3)}
/* tables */
.tablewrap{overflow:auto;border:1px solid var(--cream2);border-radius:var(--radius);background:var(--white);box-shadow:var(--shadow);margin-bottom:8px}
table{width:100%;border-collapse:collapse;font-size:12.8px}
thead th{text-align:left;color:var(--text3);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.05em;font-family:'DM Mono',monospace;padding:11px 12px;border-bottom:1.5px solid var(--cream2);white-space:nowrap;background:var(--cream)}
tbody td{padding:10px 12px;border-bottom:1px solid var(--cream2);white-space:nowrap}
tbody tr:hover{background:var(--cream)}
td.r,th.r{text-align:right}
.pill{font-size:10.5px;font-weight:700;padding:2px 9px;border-radius:999px;display:inline-block}
.pill.done{background:var(--green-bg);color:var(--green4)}.pill.prog{background:var(--gold-bg);color:var(--amber)}
.pill.plan{background:var(--cream2);color:var(--text2)}
.pill.deal{background:var(--green-bg);color:var(--green4)}.pill.wait{background:var(--gold-bg);color:var(--amber)}
.pill.cancel{background:var(--red-bg);color:var(--red)}
.pill.sampling{background:#ece4f7;color:#5b3a8e}
.chip.samp{background:#ece4f7;color:#5b3a8e}
/* Insight otomatis */
.ins-box{background:var(--white);border:1.5px solid var(--cream2);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
.ins-head{font-weight:700;font-size:13px;margin-bottom:12px;color:var(--text2)}
.ins-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px}
.ins-col{border:1.5px solid var(--cream2);border-radius:10px;padding:11px 12px;background:var(--cream)}
.ins-col.good{border-color:#bfe0cc;background:var(--green-bg)}
.ins-col.warn{border-color:#e8d49a;background:var(--gold-bg)}
.ins-col.act{border-color:#e8b9b9;background:var(--red-bg)}
.ins-col h4{font-size:12px;margin-bottom:7px}
.ins-n{font-family:'DM Mono',monospace;opacity:.6;font-weight:400}
.ins-col ul{margin:0;padding-left:16px}
.ins-col li{font-size:12.5px;line-height:1.55;margin-bottom:6px}
.ins-tag{display:inline-block;font-size:9.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:1px 5px;border-radius:4px;background:rgba(0,0,0,.07);margin-right:3px}
.ins-col code{font-family:'DM Mono',monospace;font-size:11px;background:rgba(0,0,0,.06);padding:1px 4px;border-radius:3px}
.ins-empty{font-size:12px;color:var(--text3)}
.ins-foot{margin-top:11px;font-size:11.5px;color:var(--text3);line-height:1.5}
/* Laporan (layar) */
.lap-na{font-size:12px;color:var(--text3);font-style:italic;font-weight:400}
tr.lap-od td{background:#fdf0f0}
tr.lap-soon td{background:#fffaeb}
/* Kartu ringkasan Finance */
.bcard.klik{cursor:pointer;transition:border-color .12s,box-shadow .12s}
.bcard.klik:hover{border-color:var(--gold);box-shadow:0 3px 14px rgba(200,169,110,.28)}
.bcard.on{border-color:var(--gold);background:var(--gold-bg)}
.bcard .lihat{font-size:10.5px;color:var(--text3);margin-top:5px;letter-spacing:.02em}
.bcard.on .lihat{color:var(--amber);font-weight:600}
.vsub{font-size:11.5px;margin-top:3px;line-height:1.4}
.vnetral{color:var(--text3);font-style:italic}
.bar{height:5px;border-radius:3px;background:var(--cream2);margin-top:6px;overflow:hidden}
.bar>i{display:block;height:100%;border-radius:3px;background:var(--green4)}
.bar>i.over{background:var(--red)}
.bar>i.low{background:var(--amber)}
/* Ikon penjelasan ⓘ */
.info{display:inline-flex;align-items:center;justify-content:center;width:13px;height:13px;border-radius:50%;
  background:var(--cream3);color:var(--text2);font-size:9px;font-weight:700;font-style:normal;cursor:help;
  margin-left:4px;position:relative;vertical-align:middle;text-transform:none;letter-spacing:0}
.info:hover,.info:focus{background:var(--gold);color:#fff;outline:none}
.info .tip{visibility:hidden;opacity:0;position:absolute;bottom:calc(100% + 7px);left:50%;transform:translateX(-50%);
  width:235px;max-width:calc(100vw - 16px);background:var(--green);color:#fff;font-size:11px;font-weight:400;line-height:1.5;
  padding:8px 10px;border-radius:7px;text-align:left;z-index:40;
  box-shadow:0 5px 18px rgba(0,0,0,.22);transition:opacity .12s;pointer-events:none}
.info .tip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);
  border:5px solid transparent;border-top-color:var(--green)}
/* Balik arah kalau mepet tepi layar (kelas dipasang posisiTooltip()) */
.info .tip.ki{left:auto;right:0;transform:none}
.info .tip.ki::after{left:auto;right:3px;transform:none}
.info .tip.ka{left:0;right:auto;transform:none}
.info .tip.ka::after{left:3px;transform:none}
.info:hover .tip,.info:focus .tip{visibility:visible;opacity:1}
.info .tip b{color:var(--gold2)}
.dl{font-family:'DM Mono',monospace;font-weight:600}
.dl.red{color:var(--red)}.dl.amber{color:var(--amber)}.dl.green{color:var(--green4)}
.muted{color:var(--text3)}
/* generic grid banner */
.gbanner{background:var(--green);color:#fff;font-family:'DM Serif Display',serif;font-size:15px;padding:11px 14px;border-radius:10px;margin:16px 0 9px}
.gsub{background:var(--green-bg);color:var(--green);font-weight:700;padding:9px 14px;border-radius:9px;margin:12px 0 8px;font-size:13px}
.loading{text-align:center;padding:50px;color:var(--text3)}
.spin{display:inline-block;animation:spin 1s linear infinite;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
/* login */
#gate{position:fixed;inset:0;background:linear-gradient(160deg,var(--green),var(--green2));display:grid;place-items:center;z-index:100;padding:20px}
.gatecard{background:var(--white);border-radius:16px;box-shadow:0 20px 55px rgba(0,0,0,.3);padding:30px 32px;width:min(400px,94vw)}
.gatecard .eb{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.2em;color:var(--gold);text-transform:uppercase;margin-bottom:5px}
.gatecard h2{font-family:'DM Serif Display',serif;font-size:23px;color:var(--green);font-weight:400;margin-bottom:3px}
.gatecard p{color:var(--text3);font-size:12.5px;margin-bottom:18px}
.gatecard input{width:100%;height:44px;padding:0 13px;border:1.5px solid var(--cream2);border-radius:10px;background:var(--cream);font-size:14px;font-family:inherit;color:var(--text);outline:none;margin-bottom:12px}
.gatecard input:focus{border-color:var(--green4);background:#fff}
.gatecard button{width:100%;height:44px;border:none;border-radius:10px;background:var(--gold);color:#3a2a10;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer}
.gatecard button:hover{background:var(--gold2)}
.gateErr{background:var(--red-bg);color:var(--red);border-radius:9px;padding:9px 12px;font-size:12.5px;margin-bottom:12px;display:none}
.gateErr.show{display:block}
table thead th{cursor:pointer;user-select:none}.sort-ind{opacity:.55;font-size:.85em}
</style>
</head>
<body>

<!-- LOGIN GATE (BOD) -->
<div id="gate">
  <div class="gatecard">
    <div class="eb">NRN Holding · Board of Directors</div>
    <h2>NRN Dashboard</h2>
    <p>Akses khusus BOD. Masukkan password.</p>
    <div class="gateErr" id="gateErr"></div>
    <input type="password" id="gatePw" placeholder="Password BOD" />
    <button id="gateBtn">Masuk →</button>
  </div>
</div>

<div class="header">
  <div class="header-in">
    <div class="htop">
      <div>
        <div class="eyebrow">NRN Holding · Live from Google Sheets</div>
        <h1>NRN <em>Dashboard</em></h1>
      </div>
      <div class="spacer"></div>
      <span class="tag" id="subInfo" style="color:rgba(255,255,255,.5)"></span>
      <button class="btn btn-gold" id="refreshBtn">↻ Refresh</button>
    </div>
    <div class="tabs" id="tabs"></div>
  </div>
</div>

<div class="wrap">
  <div id="content"><div class="loading"><span class="spin">⏳</span> Memuat…</div></div>
</div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyxK1M5xtaXSUO2_J5wbVPsc5QYsEIuIxrFCpFttce-KvSuTV7rkb9NSRxye5cIS2QX/exec';
const MONTHS = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];

const TABS = [
  { id:'agenda',    label:'📌 Agenda Accomplishment', type:'agenda' },
  { id:'inquiry',   label:'📋 Inquiry',              type:'inquiry' },
  { id:'finance',   label:'💰 Agenda (Finance)',     type:'finance' },
  { id:'marketing', label:'📊 Marketing (Socmed KPI)', type:'marketing' },
  { id:'agency',    label:'🏢 Agency',               type:'agency' },
  { id:'laporan',   label:'📄 Laporan',              type:'laporan' },
];
const BR = ['Revolt Industry','Radja Leather','Rove Gifts','Winddam ID'];

let active = 'agenda';
let agendaFilt = { brand:'(Semua)', bulan:'(Semua)', status:'(Semua)' };
let agendaData = null;
let inqFilt = { brand:'(Semua)', status:'(Semua)' };
let inqData = null;
let finFilt = { brand:'(Semua)', from:'(Semua)', to:'(Semua)' };
let finData = null;
let finCardSort = 0; // 0=default, 1=asc, -1=desc (kolom Task/Card Rincian)
let finOpen = ''; // panel rincian yg terbuka di Finance: '' | 'est' | 'proj' | 'act'
// Cara menaruh Budget Estimasi ke dalam bulan:
//   'akhir' = penuh di bulan card berakhir (default, sesuai keputusan awal)
//   'sebar' = dibagi ke bulan-bulan item checklist-nya, supaya SEBANDING dgn Proyeksi
let estMode = 'akhir';

/* Peta Estimasi per "brand|bulan" sesuai cara hitung yang dipilih.
   Dihitung di sisi web dari estDetail + detail — tidak perlu ubah Apps Script. */
function hitungEstMap(mode){
  const map={};
  const add=(b,m,v)=>{ if(!m||!b) return; const k=b+'|'+m; map[k]=(map[k]||0)+v; };
  if(mode!=='sebar'){
    ((finData&&finData.rows)||[]).forEach(r=> add(r.brand, r.month, r.est||0));
    return map;
  }
  // 'sebar': estimasi tiap card dibagi ke bulan tempat item checklist-nya jatuh,
  // proporsional terhadap nominal tiap bulan (kalau nominalnya 0 → dibagi rata).
  const itemsByCard={};
  ((finData&&finData.detail)||[]).forEach(d=>{
    const k=d.brand+'|'+d.card; (itemsByCard[k]=itemsByCard[k]||[]).push(d);
  });
  ((finData&&finData.estDetail)||[]).forEach(e=>{
    const items=itemsByCard[e.brand+'|'+e.card]||[];
    if(!items.length){ add(e.brand, e.month, e.est||0); return; } // tanpa checklist → tetap di bulan card
    const perBulan={}; let total=0;
    items.forEach(it=>{ if(!it.month) return; perBulan[it.month]=(perBulan[it.month]||0)+(it.nominal||0); total+=(it.nominal||0); });
    const bulan=Object.keys(perBulan);
    if(!bulan.length){ add(e.brand, e.month, e.est||0); return; }
    if(total>0) bulan.forEach(m=> add(e.brand, m, (e.est||0)*perBulan[m]/total));
    else        bulan.forEach(m=> add(e.brand, m, (e.est||0)/bulan.length));
  });
  return map;
}
let mktFilt = { brand:'Revolt Industry', month:'(Semua)' };
let mktData = null;
let agFilt = { brand:'(Semua)', bulan:'(Semua)' };
const ALL_BRANDS = '(Semua Brand)';
let lapFilt = { brand:ALL_BRANDS, month: MONTHS[new Date().getMonth()] };
let lapNotes = { wins:'', losses:'', opportunity:'', problem:'' };
const cache = {};
const fmtRp = n => 'Rp ' + (Number(n)||0).toLocaleString('id-ID');
const fmtNum = n => (Number(n)||0).toLocaleString('id-ID');
const $ = s => document.querySelector(s);

let BOD_PW = '';
const PW = () => '&password=' + encodeURIComponent(BOD_PW);

function renderTabs(){
  $('#tabs').innerHTML = TABS.map(t =>
    `<button class="tab ${t.id===active?'on':''}" data-tab="${t.id}">${t.label}</button>`).join('');
  document.querySelectorAll('[data-tab]').forEach(b => b.onclick = () => { active = b.dataset.tab; load(); });
}

async function load(force){
  renderTabs();
  const tab = TABS.find(t => t.id===active);
  $('#content').innerHTML = '<div class="loading"><span class="spin">⏳</span> Memuat…</div>';
  try{
    if(tab.type==='agenda'){
      if(force || !agendaData){ const r = await fetch(APPS_SCRIPT_URL+'?action=getAgenda'+PW()); agendaData = await r.json(); }
      if(!agendaData.success) throw new Error(agendaData.error);
      $('#subInfo').textContent = 'Bulan ini: '+agendaData.bulanIni;
      renderAgenda();
    } else if(tab.type==='inquiry'){
      if(force || !inqData){ const r = await fetch(APPS_SCRIPT_URL+'?action=getInquiryAll'+PW()); inqData = await r.json(); }
      if(!inqData.success) throw new Error(inqData.error);
      $('#subInfo').textContent = inqData.detail.length+' inquiry';
      renderInquiry();
    } else if(tab.type==='finance'){
      if(force || !finData){ const r = await fetch(APPS_SCRIPT_URL+'?action=getFinanceAll'+PW()); finData = await r.json(); }
      if(!finData.success) throw new Error(finData.error);
      $('#subInfo').textContent = 'Tahun '+finData.year;
      renderFinance();
    } else if(tab.type==='marketing'){
      if(force || !mktData){ const r = await fetch(APPS_SCRIPT_URL+'?action=getMarketingAll'+PW()); mktData = await r.json(); }
      if(!mktData.success) throw new Error(mktData.error);
      $('#subInfo').textContent = mktData.rows.length+' laporan';
      renderMarketing();
    } else if(tab.type==='agency'){
      if(force || !finData){ const r = await fetch(APPS_SCRIPT_URL+'?action=getFinanceAll'+PW()); finData = await r.json(); }
      if(!finData.success) throw new Error(finData.error);
      $('#subInfo').textContent = 'Penggunaan agency';
      renderAgency();
    } else if(tab.type==='laporan'){
      if(force || !agendaData){ const r = await fetch(APPS_SCRIPT_URL+'?action=getAgenda'+PW()); agendaData = await r.json(); }
      if(force || !finData){ const r = await fetch(APPS_SCRIPT_URL+'?action=getFinanceAll'+PW()); finData = await r.json(); }
      if(force || !mktData){ const r = await fetch(APPS_SCRIPT_URL+'?action=getMarketingAll'+PW()); mktData = await r.json(); }
      if(force || !inqData){ const r = await fetch(APPS_SCRIPT_URL+'?action=getInquiryAll'+PW()); inqData = await r.json(); }
      $('#subInfo').textContent = 'Laporan bulanan';
      renderLaporan();
    } else {
      if(force) delete cache[tab.sheet];
      if(!cache[tab.sheet]){ const r = await fetch(APPS_SCRIPT_URL+'?action=getSheet&name='+encodeURIComponent(tab.sheet)+PW()); cache[tab.sheet] = await r.json(); }
      const d = cache[tab.sheet];
      if(!d.success) throw new Error(d.error);
      $('#subInfo').textContent = '';
      renderGrid(d.values);
    }
  }catch(e){
    $('#content').innerHTML = '<div class="loading">⚠️ Gagal memuat.<br><small>'+(e.message||e)+'</small><br><small>Pastikan Web App sudah di-deploy ulang.</small></div>';
  }
}

/* ===== AGENDA (rich) ===== */
// Normalisasi status → 4 label (kompatibel nilai lama Planned/On Progress)
function statusLabel(st){
  const z = String(st||'');
  if(z==='Done') return 'Done';
  if(z==='In Progress' || z==='On Progress') return 'In Progress';
  if(z.indexOf('Checklist')>=0 || z==='Planned') return 'Checklist Created';
  if(z.indexOf('Task')>=0) return 'Task Created';
  return z || '—';
}
function statusPill(st){
  const L = statusLabel(st);
  if(L==='Done')             return '<span class="pill done">Done</span>';
  if(L==='In Progress')      return '<span class="pill prog">In Progress</span>';
  if(L==='Checklist Created')return '<span class="pill" style="background:#e3eef5;color:#1d4e6f">Checklist Created</span>';
  if(L==='Task Created')     return '<span class="pill plan">Task Created</span>';
  return '<span class="pill plan">'+L+'</span>';
}
function sisaCls(n){ if(n===null) return ''; if(n<=3) return 'red'; if(n<=7) return 'amber'; return 'green'; }
let agendaSort = 0; // 0=off, 1=asc, -1=desc (kolom Card/Agenda)

function renderAgenda(){
  const D = agendaData, f = agendaFilt;
  const cards = D.summary.map(b => `
    <div class="bcard"><h3>${b.brand}</h3>
      <div class="big">${b.total}</div><div class="biglbl">Total Agenda</div>
      <div class="statrow">
        <span class="chip month">📅 ${b.bulanIni}</span>
        <span class="chip done">✓ ${b.done}</span>
        <span class="chip prog">◐ ${b.onProgress}</span>
        <span class="chip plan">○ ${b.planned}</span>
      </div></div>`).join('');
  const brandOpts = ['(Semua)'].concat(D.summary.map(b=>b.brand));
  const bulanSet = ['(Semua)'].concat([...new Set(D.detail.map(d=>d.bulan).filter(Boolean))].sort((a,b)=>MONTHS.indexOf(a)-MONTHS.indexOf(b)));
  const STATUS_ORDER = ['Task Created','Checklist Created','In Progress','Done'];
  const statusPresent = [...new Set(D.detail.map(d=>statusLabel(d.status)).filter(Boolean))]
    .sort((a,b)=>STATUS_ORDER.indexOf(a)-STATUS_ORDER.indexOf(b));
  const statusOpts = ['(Semua)'].concat(statusPresent);
  const opt=(arr,sel)=>arr.map(v=>`<option ${v===sel?'selected':''}>${v}</option>`).join('');
  let rows = D.detail.filter(d =>
    (f.brand==='(Semua)'||d.brand===f.brand)&&(f.bulan==='(Semua)'||d.bulan===f.bulan)&&(f.status==='(Semua)'||statusLabel(d.status)===f.status));
  if(agendaSort!==0) rows = [...rows].sort((a,b)=> agendaSort * String(a.card||'').localeCompare(String(b.card||'')));
  const sortArrow = agendaSort===0 ? '↕' : (agendaSort===1 ? '▲' : '▼');
  const tb = rows.length ? rows.map(d=>`
    <tr><td><b>${d.brand}</b></td><td>${d.card||'—'}</td><td>${d.subtask||'—'}</td><td>${d.bulan||'—'}</td>
    <td class="dl">${d.deadline||'—'}</td><td class="dl ${statusLabel(d.status)==='Done'?'green':sisaCls(d.sisaHari)}">${statusLabel(d.status)==='Done'?'✓ Completed':(d.sisaHari===null?'—':d.sisaHari+' hari')}</td>
    <td>${statusPill(d.status)}</td><td class="muted">${d.pic||'—'}</td></tr>`).join('')
    : '<tr><td colspan="8" class="muted" style="text-align:center;padding:24px">Tidak ada data.</td></tr>';
  $('#content').innerHTML = `
    <div class="section-title">📊 Summary Pencapaian</div>
    <div class="brandgrid">${cards}</div>
    <div class="section-title">📑 Checklist &amp; Deadline</div>
    <div class="toolbar">
      <span class="lbl">Brand</span><select id="fBrand">${opt(brandOpts,f.brand)}</select>
      <span class="lbl">Bulan</span><select id="fBulan">${opt(bulanSet,f.bulan)}</select>
      <span class="lbl">Status</span><select id="fStatus">${opt(statusOpts,f.status)}</select>
      <span class="tag">${rows.length} / ${D.detail.length} milestone</span>
    </div>
    <div class="tablewrap"><table>
      <thead><tr><th>Brand</th><th id="thCard" style="cursor:pointer;user-select:none">Card / Agenda <span style="opacity:.6">${sortArrow}</span></th><th>Subtask</th><th>Bulan</th><th>Deadline</th><th>Sisa Hari</th><th>Status</th><th>PIC</th></tr></thead>
      <tbody>${tb}</tbody></table></div>`;
  $('#fBrand').onchange=e=>{f.brand=e.target.value;renderAgenda();};
  $('#fBulan').onchange=e=>{f.bulan=e.target.value;renderAgenda();};
  $('#fStatus').onchange=e=>{f.status=e.target.value;renderAgenda();};
  $('#thCard').onclick=()=>{ agendaSort = agendaSort===1 ? -1 : (agendaSort===-1 ? 0 : 1); renderAgenda(); };
}

// Ubah #lap-report jadi dokumen siap cetak.
// srcId = id container di layar; opts = {brand, periode, judul}
function buildLaporanPrintDoc(srcId, opts){
  const src = document.getElementById(srcId);
  if(!src) return null;
  const root = src.cloneNode(true);

  // 1) textarea → teks biasa (kalau tidak, isinya hilang saat dicetak)
  const live = src.querySelectorAll('textarea');
  root.querySelectorAll('textarea').forEach((ta,i)=>{
    const val = (live[i] ? live[i].value : ta.value || '').trim();
    const wrap = ta.closest('div');
    const lbl = wrap ? wrap.querySelector('label') : null;
    const d = document.createElement('div');
    d.className = 'qa-item';
    d.innerHTML = `<div class="qa-label">${lbl?lbl.innerHTML:''}</div>
      <div class="qa-text${val?'':' kosong'}">${val ? val.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])) : '— belum diisi —'}</div>`;
    // buang hint kecil di atas textarea supaya tidak ikut
    if(wrap && wrap.parentNode){ wrap.parentNode.replaceChild(d, wrap); }
    else if(ta.parentNode){ ta.parentNode.replaceChild(d, ta); }
  });

  // 2) buang kontrol yang tidak relevan di kertas
  root.querySelectorAll('.toolbar,button,select,.iconbtn').forEach(el=>el.remove());

  // 3) section-title div → h2 supaya tidak putus di ujung halaman
  root.querySelectorAll('.section-title').forEach(el=>{
    const h=document.createElement('h2'); h.className='section-title'; h.innerHTML=el.innerHTML;
    el.parentNode.replaceChild(h,el);
  });

  const now = new Date();
  const tgl = now.toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'});
  const jam = now.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
  return `<!doctype html><html lang="id"><head><meta charset="utf-8">
    <title>${opts.judul}</title><style>${LAP_PRINT_CSS}</style></head><body>
    <div class="doc-head">
      <div>
        <div class="doc-org">PT. NRN Holding</div>
        <div class="doc-title">${opts.judul}</div>
        <div class="doc-sub">${opts.periode}</div>
      </div>
      <div class="doc-meta">Dicetak ${tgl}<br>pukul ${jam} WIB</div>
    </div>
    ${root.innerHTML}
    <div class="sign">
      <div class="sign-box"><div class="sign-role">Disiapkan oleh</div><div class="sign-line">${opts.brand||'Tim Brand'}</div></div>
      <div class="sign-box"><div class="sign-role">Diperiksa / Disetujui</div><div class="sign-line">Direksi</div></div>
    </div>
    <div class="doc-foot">Dokumen ini dihasilkan otomatis oleh NRN Marketing Hub. Angka bersumber dari Trello, Google Sheets &amp; laporan sosmed bulanan.</div>
    </body></html>`;
}

function openPrintWindow(html){

/* ══════════ INSIGHT OTOMATIS (rule-based — tanpa API, gratis) ══════════
   Merangkum data yang SUDAH ter-generate (Agenda, Sosmed, Inquiry, Anggaran)
   jadi 3 kelompok: sudah jalan / perlu perhatian / butuh aksi.
   Semua angka dihitung dari data — deterministik, hasil sama untuk data sama.
   Read-only: TIDAK mengisi Analisa Kualitatif (itu tetap ditulis brand).
   Blok ini identik di nrn-inquiry-form & nrn-dashboard — kalau diubah,
   ubah di dua-duanya. */
const INS = { erLow:1, erGood:3, reachDrop:20, doneGood:80, doneLow:50,
              convLow:10, convGood:25, cancelHigh:40,
              quoStale:30, sampStale:45, overspend:110, underspend:50,
              dueSoon:7, saveRatio:5, shareRatio:3 };
const insEsc = s => String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const insPct = (a,b) => b ? (a/b*100) : 0;
const insR   = v => Math.round(v);
const insSg  = v => (v>=0?'+':'')+insR(v)+'%';
// Umur (hari) dari string tanggal; toleran thd 'yyyy-MM-dd' & 'dd MMM yyyy'.
function insAge(s){
  if(!s) return null;
  const d = new Date(String(s).replace(' ','T'));
  const d2 = isNaN(d.getTime()) ? new Date(String(s)) : d;
  if(isNaN(d2.getTime())) return null;
  return Math.floor((Date.now()-d2.getTime())/86400000);
}
// Alasan cancel yang jelas data uji — bukan alasan bisnis sungguhan.
const INS_TEST_RE = /^(test|testing|tes|coba|cobain|dummy|sample|asal|abc|xxx+|\.+|-+|123\d*)\s*\d*$/i;
function insIsTestCancel(x){
  const r = String(x.alasanCancel||'').trim();
  if(!r) return false;                    // alasan kosong = data asli yang belum diisi, bukan uji
  return INS_TEST_RE.test(r);
}
// Nama tahap terakhir yang tercatat + tanggalnya (dari kolom tanggal statis)
function insLastStep(x){
  const steps = [['Cancel',x.tglCancel],['Deal',x.tglDeal],['Sampling',x.tglSampling],['Quotation',x.tglQuotation]];
  for(const [nama,tgl] of steps) if(tgl) return {nama, tgl, umur:insAge(tgl)};
  return null;
}

/* D = { brand, month, prevM, nextM,
        bCur{est,proj,act}, bNext,
        so{reach,views,follows,er,posts,likes,comments,shares,saves,storyER}, sp,
        ag[], agDone, agProg, agLabel(fn),
        inqMonth[]   — inquiry yang MASUK bulan laporan
        inqPipeline[]— quotation+sampling yang masih berjalan (semua bulan)
        inqDealMo[]  — deal di bulan laporan
        inqCancelMo[]— cancel bulan laporan, alasan wajar (data uji sudah dibuang)
        inqTestN     — jumlah cancel yang dibuang karena alasan = data uji
        inqQuo[], inqSamp[] — pipeline dipecah per tahap } */
function buildInsight(D){
  const S=[], W=[], A=[];
  const put=(g,scope,txt)=>g.push({scope,txt});

  /* ═══ ANGGARAN ═══ */
  const b = D.bCur;
  if(!b.est && !b.proj && !b.act){
    put(A,'Anggaran',`Belum ada data anggaran ${insEsc(D.month)} sama sekali. Kemungkinan card Trello bulan ini belum diisi <code>Estimated Budget:</code> di deskripsi, dan checklist-nya belum diberi nominal <code>(Rp ...)</code>.`);
  } else {
    if(!b.est && b.proj)
      put(A,'Anggaran',`Rencana belanja ${fmtRp(b.proj)} sudah jalan, tapi <b>patokan awalnya (Budget Estimasi) tidak pernah diisi</b> — jadi tidak ada pembanding untuk menilai rencana ini wajar atau tidak. Isi <code>Estimated Budget:</code> di deskripsi card.`);
    if(b.est && b.proj > b.est*1.2)
      put(W,'Anggaran',`Rencana terkini ${fmtRp(b.proj)} sudah ${insSg(insPct(b.proj-b.est,b.est))} di atas patokan awal ${fmtRp(b.est)} — rencananya membengkak, meski uangnya belum tentu keluar.`);

    // Aktual — bagian yang paling perlu bahasa manusia
    if(b.proj && !b.act){
      put(W,'Anggaran',`<b>Biaya aktual belum terupdate.</b> Rencana ${fmtRp(b.proj)} sudah tercatat, tapi realisasinya masih kosong. Kalau bulan ini memang sudah ada pengeluaran, minta tim mencatatnya; kalau memang belum ada yang keluar, berarti eksekusi belum jalan.`);
    } else if(b.act){
      const sp = insPct(b.act,b.proj);
      if(!b.proj){
        put(W,'Anggaran',`Uang keluar ${fmtRp(b.act)} tapi <b>tidak ada rencana yang tercatat</b> untuk dibandingkan — pengeluaran ini di luar perencanaan, atau checklist-nya belum diberi nominal.`);
      } else if(b.act > b.proj){
        put(A,'Anggaran',`<b>Biaya aktual lebih besar dari rencana</b> — keluar ${fmtRp(b.act)} dari rencana ${fmtRp(b.proj)}, selisih ${fmtRp(b.act-b.proj)} (${insR(sp)}%). Ini perlu dipertanyakan: apa yang bikin lebih, dan apakah sudah disetujui?`);
      } else if(sp < INS.underspend){
        put(W,'Anggaran',`Baru ${fmtRp(b.act)} yang terpakai dari rencana ${fmtRp(b.proj)} (${insR(sp)}%). Sisa ${fmtRp(b.proj-b.act)} — entah rencananya mundur, atau ada yang belum dicatat.`);
      } else {
        put(S,'Anggaran',`Belanja terkendali: ${fmtRp(b.act)} dari rencana ${fmtRp(b.proj)} (${insR(sp)}%), masih di dalam rencana.`);
      }
    }

    if(!D.bNext.proj)
      put(A,'Anggaran',`Belum ada rencana anggaran untuk ${insEsc(D.nextM)} — bulan depan belum bisa diantisipasi. Isi nominal <code>(Rp ...)</code> di checklist card bulan depan.`);
    else
      put(S,'Anggaran',`Rencana ${insEsc(D.nextM)} sudah disiapkan ${fmtRp(D.bNext.proj)}.`);
  }

  /* ═══ AGENDA ═══ */
  const agT = D.ag.length;
  if(!agT){
    put(A,'Agenda',`Belum ada agenda ${insEsc(D.month)} — brand belum planning apa pun di Trello untuk bulan ini.`);
  } else {
    const dr = insPct(D.agDone,agT);
    const belumDone = D.ag.filter(x => D.agLabel(x.status)!=='Done');
    const overdue   = belumDone.filter(x => x.sisaHari!=null && x.sisaHari<0);
    const dueSoon   = belumDone.filter(x => x.sisaHari!=null && x.sisaHari>=0 && x.sisaHari<=INS.dueSoon);
    const belumMulai= D.ag.filter(x => ['Task Created','Checklist Created'].indexOf(D.agLabel(x.status))>=0);
    const nm = x => insEsc(x.subtask || x.card || '(tanpa nama)');
    const daftar = (arr,n) => arr.slice(0,n).map(x=>{
      const d = x.deadline ? ` <span class="muted">(${insEsc(x.deadline)})</span>` : '';
      return nm(x)+d;
    }).join(' · ') + (arr.length>n?` <span class="muted">…+${arr.length-n} lagi</span>`:'');

    if(dr >= INS.doneGood)      put(S,'Agenda',`${D.agDone} dari ${agT} agenda selesai (${insR(dr)}%) — eksekusi bulan ini rapi.`);
    else if(dr >= INS.doneLow)  put(W,'Agenda',`Baru ${D.agDone} dari ${agT} agenda selesai (${insR(dr)}%); ${D.agProg} sedang dikerjakan.`);
    else                        put(A,'Agenda',`Baru ${D.agDone} dari ${agT} agenda selesai (${insR(dr)}%) — eksekusi tertinggal jauh dari rencana.`);

    if(overdue.length)
      put(A,'Agenda',`<b>${overdue.length} sudah lewat deadline</b> dan belum selesai: ${daftar(overdue,4)}. Ini yang paling perlu dikejar.`);
    if(dueSoon.length)
      put(W,'Agenda',`<b>${dueSoon.length} deadline-nya tinggal ≤${INS.dueSoon} hari</b> dan belum selesai: ${daftar(dueSoon,4)}. Masih bisa dikejar kalau mulai sekarang.`);
    if(belumMulai.length)
      put(W,'Agenda',`${belumMulai.length} agenda belum tersentuh sama sekali (belum ada checklist yang jalan): ${daftar(belumMulai,3)}.`);
    if(!overdue.length && D.agDone < agT && dr >= INS.doneLow)
      put(S,'Agenda',`Tidak ada agenda yang lewat deadline — sisa ${agT-D.agDone} masih dalam jadwal.`);
  }

  /* ═══ SOSMED ═══ */
  const so=D.so, sp=D.sp;
  if(!so.reach && !so.views && !so.posts){
    put(A,'Sosmed',`Data sosmed ${insEsc(D.month)} belum masuk — performa belum bisa dinilai. Pastikan laporan bulanan sudah di-submit lewat app Monthly Report.`);
  } else {
    // Jangkauan
    if(sp.reach){
      const rd = insPct(so.reach-sp.reach, sp.reach);
      if(rd <= -INS.reachDrop)
        put(A,'Sosmed',`<b>Jangkauan turun tajam ${Math.abs(insR(rd))}%</b> — dari ${fmtNum(sp.reach)} orang (${insEsc(D.prevM)}) jadi ${fmtNum(so.reach)}. Cek frekuensi posting & jenis konten.`);
      else if(rd < 0)
        put(W,'Sosmed',`Jangkauan turun tipis ${Math.abs(insR(rd))}% (${fmtNum(sp.reach)} → ${fmtNum(so.reach)} orang).`);
      else
        put(S,'Sosmed',`Jangkauan naik ${insR(rd)}% — dari ${fmtNum(sp.reach)} jadi ${fmtNum(so.reach)} orang.`);
    } else if(so.reach){
      put(S,'Sosmed',`Jangkauan ${insEsc(D.month)} ${fmtNum(so.reach)} orang (belum ada data ${insEsc(D.prevM)} untuk dibandingkan).`);
    }

    // Engagement rate
    if(so.er){
      const ed = (so.er && sp.er) ? so.er-sp.er : null;
      const arah = ed==null ? '' : ed>=0 ? ` (naik ${ed.toFixed(2)}pp dari ${insEsc(D.prevM)})` : ` (turun ${Math.abs(ed).toFixed(2)}pp dari ${insEsc(D.prevM)})`;
      if(so.er < INS.erLow)        put(A,'Sosmed',`Engagement rate ${so.er.toFixed(2)}%${arah} — di bawah batas sehat ${INS.erLow}%. Konten dilihat tapi tidak memancing orang berinteraksi.`);
      else if(so.er >= INS.erGood) put(S,'Sosmed',`Engagement rate ${so.er.toFixed(2)}%${arah} — sehat, di atas ${INS.erGood}%.`);
      else                         put(W,'Sosmed',`Engagement rate ${so.er.toFixed(2)}%${arah} — wajar tapi belum kuat (target >${INS.erGood}%).`);
    }

    // Kualitas interaksi: save & share itu sinyal paling kuat
    const eng = (so.likes||0)+(so.comments||0)+(so.shares||0)+(so.saves||0);
    if(eng){
      const shareP = insPct(so.shares||0, eng), saveP = insPct(so.saves||0, eng);
      const rinci = `${fmtNum(so.likes||0)} like · ${fmtNum(so.comments||0)} komentar · ${fmtNum(so.shares||0)} share · ${fmtNum(so.saves||0)} save`;
      if(saveP >= INS.saveRatio || shareP >= INS.shareRatio)
        put(S,'Sosmed',`Interaksi berkualitas: ${rinci}. Save ${saveP.toFixed(1)}% & share ${shareP.toFixed(1)}% dari total — orang bukan cuma like, tapi menyimpan/menyebarkan.`);
      else
        put(W,'Sosmed',`Dari ${fmtNum(eng)} interaksi (${rinci}), <b>share cuma ${shareP.toFixed(1)}% dan save ${saveP.toFixed(1)}%</b> — mayoritas berhenti di like. Konten kurang layak disimpan/dibagikan.`);
    }

    // Efisiensi konten
    if(so.posts){
      const rpp = Math.round((so.reach||0)/so.posts), epp = Math.round(eng/so.posts);
      const prevPosts = sp.posts||0;
      let bandingan = '';
      if(prevPosts){
        const dp = so.posts - prevPosts;
        bandingan = dp===0 ? ` (sama dgn ${insEsc(D.prevM)})` : ` (${dp>0?'+':''}${dp} dari ${insEsc(D.prevM)})`;
      }
      put(S,'Sosmed',`${so.posts} konten diposting${bandingan} — rata-rata menjangkau ${fmtNum(rpp)} orang & ${fmtNum(epp)} interaksi per konten.`);
      // Posting lebih banyak tapi reach turun = konten makin tidak efektif
      if(prevPosts && so.posts > prevPosts && sp.reach && so.reach < sp.reach)
        put(A,'Sosmed',`<b>Posting lebih banyak (${prevPosts} → ${so.posts}) tapi jangkauan malah turun</b> — menambah jumlah konten tidak menyelesaikan masalah; yang perlu diperbaiki kualitas/format, bukan kuantitas.`);
      if(prevPosts && so.posts < prevPosts*0.6)
        put(W,'Sosmed',`Jumlah konten turun drastis (${prevPosts} → ${so.posts}) — konsistensi posting berkurang.`);
    }

    // Follower
    if(so.follows<=0 && sp.follows>0)
      put(W,'Sosmed',`Tidak ada follower baru bulan ini (${insEsc(D.prevM)}: ${fmtNum(sp.follows)}) — pertumbuhan berhenti.`);
    else if(so.follows>0)
      put(S,'Sosmed',`${fmtNum(so.follows)} follower baru${sp.follows?` (${insEsc(D.prevM)}: ${fmtNum(sp.follows)})`:''}.`);

    if(so.storyER!=null && so.storyER>0)
      put(so.storyER>=INS.erGood?S:W,'Sosmed',`Story ER ${so.storyER.toFixed(2)}%${so.storyER<INS.erGood?` — di bawah target ${INS.erGood}%`:' — story cukup diminati'}.`);
  }

  /* ═══ INQUIRY ═══ */
  const mo = D.inqMonth, pipe = D.inqPipeline;
  const dealMo = D.inqDealMo, cancelMo = D.inqCancelMo;
  if(!mo.length && !pipe.length){
    put(A,'Inquiry',`Tidak ada inquiry masuk di ${insEsc(D.month)} dan tidak ada pipeline berjalan — tidak ada yang bisa di-follow up.`);
  } else {
    // Performa bulan ini
    if(mo.length){
      const conv = insPct(dealMo.length, mo.length);
      const nilaiDeal = dealMo.reduce((s,x)=>s+(x.nominal||0),0);
      if(conv >= INS.convGood)     put(S,'Inquiry',`${mo.length} inquiry masuk ${insEsc(D.month)}, ${dealMo.length} jadi deal (${insR(conv)}%) senilai ${fmtRp(nilaiDeal)} — konversi di atas target ${INS.convGood}%.`);
      else if(conv < INS.convLow)  put(A,'Inquiry',`${mo.length} inquiry masuk ${insEsc(D.month)} tapi <b>cuma ${dealMo.length} yang jadi (${insR(conv)}%)</b> — mayoritas tidak closing. Cek kualitas lead & cara follow up.`);
      else                         put(W,'Inquiry',`${mo.length} inquiry masuk ${insEsc(D.month)}, ${dealMo.length} jadi deal (${insR(conv)}%) senilai ${fmtRp(nilaiDeal)} — masih di bawah target ${INS.convGood}%.`);
    } else {
      put(W,'Inquiry',`Tidak ada inquiry baru masuk di ${insEsc(D.month)} — pipeline tidak bertambah bulan ini.`);
    }

    // Pipeline berjalan
    if(pipe.length){
      const nilai = pipe.reduce((s,x)=>s+(x.nominal||0),0);
      put(S,'Inquiry',`${pipe.length} inquiry masih berjalan senilai ${fmtRp(nilai)} (${D.inqQuo.length} quotation · ${D.inqSamp.length} sampling) — ini yang perlu dikejar.`);

      // Mengendap: sebut nama + sudah berapa lama + terakhir sampai tahap apa
      const staleQ = D.inqQuo.filter(x=>{ const a=insAge(x.tglQuotation); return a!=null && a>INS.quoStale; })
                             .sort((a,b)=>(insAge(b.tglQuotation)||0)-(insAge(a.tglQuotation)||0));
      const staleS = D.inqSamp.filter(x=>{ const a=insAge(x.tglSampling); return a!=null && a>INS.sampStale; })
                             .sort((a,b)=>(insAge(b.tglSampling)||0)-(insAge(a.tglSampling)||0));
      const rinci = (arr,tglKey,n) => arr.slice(0,n).map(x=>{
        const a=insAge(x[tglKey]);
        return `<b>${insEsc(x.customer)}</b> (${a} hari${x.nominal?', '+fmtRp(x.nominal):''})`;
      }).join(' · ') + (arr.length>n?` <span class="muted">…+${arr.length-n} lagi</span>`:'');
      if(staleQ.length)
        put(A,'Inquiry',`<b>${staleQ.length} quotation mengendap >${INS.quoStale} hari</b> tanpa maju ke sampling: ${rinci(staleQ,'tglQuotation',4)}. Follow up atau tutup sebagai cancel supaya pipeline tidak menipu.`);
      if(staleS.length)
        put(A,'Inquiry',`<b>${staleS.length} sampling jalan >${INS.sampStale} hari</b> belum closing: ${rinci(staleS,'tglSampling',4)}. Sampling yang terlalu lama biasanya tanda ada yang mengganjal di harga/spek.`);
      if(!staleQ.length && !staleS.length)
        put(S,'Inquiry',`Tidak ada inquiry yang mengendap — semua pipeline masih bergerak dalam waktu wajar.`);
    } else if(mo.length){
      put(W,'Inquiry',`Tidak ada pipeline yang berjalan — semua inquiry sudah tuntas (deal/cancel), tidak ada potensi closing tersisa.`);
    }

    // Cancel (alasan wajar saja — data uji sudah dibuang)
    if(cancelMo.length){
      const cr = insPct(cancelMo.length, Math.max(mo.length,1));
      const alasan = {};
      cancelMo.forEach(x=>{ const r=String(x.alasanCancel||'').trim()||'(tanpa alasan)'; alasan[r]=(alasan[r]||0)+1; });
      const top = Object.entries(alasan).sort((a,b)=>b[1]-a[1]).slice(0,3)
                        .map(([r,n])=>`${insEsc(r)}${n>1?` (${n}×)`:''}`).join(' · ');
      if(mo.length && cr > INS.cancelHigh)
        put(W,'Inquiry',`<b>${cancelMo.length} dari ${mo.length} inquiry ${insEsc(D.month)} batal (${insR(cr)}%)</b>. Alasan terbanyak: ${top}. Kalau alasannya berulang, itu masalah yang bisa diperbaiki.`);
      else
        put(W,'Inquiry',`${cancelMo.length} inquiry batal di ${insEsc(D.month)}. Alasan: ${top}.`);
      const tanpaAlasan = cancelMo.filter(x=>!String(x.alasanCancel||'').trim()).length;
      if(tanpaAlasan)
        put(W,'Inquiry',`${tanpaAlasan} cancel tidak diisi alasannya — tanpa alasan, tidak ada yang bisa dipelajari dari kegagalan itu.`);
    }
  }

  return { sudah:S, perhatian:W, aksi:A };
}

// Normalisasi status → key (harus sama dgn inqStatusKey_ di backend & Brand Needs)
function inqKey(s){
  const z=String(s||'');
  if(z.indexOf('Deal')>=0) return 'deal';
  if(z.indexOf('Cancel')>=0) return 'cancel';
  if(z.toLowerCase().indexOf('sampling')>=0) return 'sampling';
  return 'quotation';
}

const INQ_CLASS={quotation:'wait',sampling:'sampling',deal:'deal',cancel:'cancel'};
function inqPill(st){ const k=inqKey(st); return '<span class="pill '+INQ_CLASS[k]+'">'+INQ_LABEL[k]+'</span>'; }
function renderInquiry(){

    <td class="muted">${d.alasanCancel||'—'}</td><td class="muted">${d.salesPic||'—'}</td></tr>`).join('')
    : '<tr><td colspan="13" class="muted" style="text-align:center;padding:24px">Tidak ada data.</td></tr>';

/* ===== FINANCE (rich, filter brand + range bulan) ===== */
function renderFinance(){
  const rows = finData.rows, f = finFilt;
  const fromIdx = f.from==='(Semua)' ? 0 : MONTHS.indexOf(f.from);
  const toIdx   = f.to==='(Semua)'   ? 11 : MONTHS.indexOf(f.to);
  const flt = rows.filter(r =>
    (f.brand==='(Semua)'||r.brand===f.brand) &&
    (MONTHS.indexOf(r.month)>=fromIdx && MONTHS.indexOf(r.month)<=toIdx));

  const sum = (arr,k)=>arr.reduce((s,x)=>s+(x[k]||0),0);
  // Estimasi diambil dari peta (ikut cara hitung terpilih), bukan langsung dari baris sheet
  const estMap = hitungEstMap(estMode);
  const estJumlah = (brandOnly, monthOnly) => {
    let s=0;
    Object.keys(estMap).forEach(k=>{
      const pos=k.lastIndexOf('|'), b=k.slice(0,pos), m=k.slice(pos+1);
      if(f.brand!=='(Semua)' && b!==f.brand) return;
      if(brandOnly && b!==brandOnly) return;
      if(monthOnly && m!==monthOnly) return;
      const mi=MONTHS.indexOf(m);
      if(mi<fromIdx || mi>toIdx) return;
      s+=estMap[k];
    });
    return Math.round(s);
  };
  const est=estJumlah(), proj=sum(flt,'proj'), act=sum(flt,'act');
  const vEst=act-est, vProj=act-proj;
  const task=sum(flt,'taskCount'), done=sum(flt,'doneCount'), ovd=sum(flt,'overdueCount');
  const vcol=v=>v<=0?'var(--green4)':'var(--red)';
  // Sel selisih di tabel. Kalau aktual/pembanding kosong → "—" netral, JANGAN hijau:
  // hijau di situ terbaca "hemat" padahal artinya cuma belum ada datanya.
  const vCell=(a,base)=>{
    if(!a || !base) return '<span class="lap-na">—</span>';
    const d=a-base, lebih=d>0;
    return `<span style="color:${lebih?'var(--red)':'var(--green4)'}" title="${lebih?'di atas':'di bawah'} pembanding">${lebih?'▲':'▼'} ${fmtRp(Math.abs(d))}</span>`;
  };

  const opt=(arr,sel)=>arr.map(v=>`<option ${v===sel?'selected':''}>${v}</option>`).join('');
  const brandOpts=['(Semua)'].concat(BR), monthOpts=['(Semua)'].concat(MONTHS);

  // Rincian pengeluaran (per task + checklist) dari nominal checklist
  const cleanSub = s => String(s||'').replace(/^\s*\[[^\]]*\]\s*[-–—]?\s*/,'').replace(/\s*\(\s*rp[^)]*\)\s*$/i,'').trim();
  const detail = (finData.detail||[]).filter(d =>
    (f.brand==='(Semua)'||d.brand===f.brand) &&
    (MONTHS.indexOf(d.month)>=fromIdx && MONTHS.indexOf(d.month)<=toIdx));
  if(finCardSort!==0) detail.sort((a,b)=> finCardSort * String(a.card||'').localeCompare(String(b.card||'')));
  else detail.sort((a,b)=> (MONTHS.indexOf(a.month)-MONTHS.indexOf(b.month)) || a.brand.localeCompare(b.brand) || a.card.localeCompare(b.card));
  const finCardArrow = finCardSort===0 ? '↕' : (finCardSort===1 ? '▲' : '▼');
  const detailTotal = detail.reduce((s,d)=>s+(d.nominal||0),0);
  const dRows = detail.map(d=>
    `<tr><td><b>${d.month}</b></td><td>${d.brand}</td><td>${d.card}</td><td class="muted">${cleanSub(d.subtask)}</td><td class="dl">${d.deadline||'—'}</td><td class="r num">${fmtRp(d.nominal)}</td></tr>`
  ).join('') || '<tr><td colspan="6" class="muted" style="text-align:center;padding:20px">Belum ada nominal di checklist untuk filter ini.</td></tr>';

  // Rincian Budget Estimasi per card (klik kartu Estimasi)
  const estDet = (finData.estDetail||[]).filter(d =>
    (f.brand==='(Semua)'||d.brand===f.brand) &&
    (MONTHS.indexOf(d.month)>=fromIdx && MONTHS.indexOf(d.month)<=toIdx));
  estDet.sort((a,b)=>(b.est||0)-(a.est||0));
  const estDetTotal = estDet.reduce((s,d)=>s+(d.est||0),0);
  const eRows = estDet.map(d=>
    `<tr><td>${d.card||'—'}</td><td>${d.brand}</td><td><b>${d.month||'—'}</b></td><td class="muted">${d.list||'—'}</td><td class="r num">${fmtRp(d.est)}</td></tr>`
  ).join('') || '<tr><td colspan="5" class="muted" style="text-align:center;padding:20px">Belum ada card dengan Estimated Budget untuk filter ini.</td></tr>';
  const estPanel = finOpen!=='est' ? '' : `
    <div class="section-title">🔎 Rincian Budget Estimasi — dari card mana saja</div>
    <div class="muted" style="margin:-4px 0 10px;font-size:12px">Diambil dari <b>Estimated Budget:</b> di deskripsi tiap card Trello, dihitung di bulan card berakhir.</div>
    <div class="tablewrap"><table><thead><tr><th>Card / Agenda</th><th>Brand</th><th>Bulan</th><th>List</th><th class="r">Estimasi</th></tr></thead><tbody>${eRows}<tr><td colspan="4" class="r"><b>Total</b></td><td class="r num"><b>${fmtRp(estDetTotal)}</b></td></tr></tbody></table></div>`;

  /* ── PECAHAN ESTIMASI ────────────────────────────────────────────
     Konsep: Proyeksi = rincian/pecahan dari Budget Estimasi.
     Estimasi = angka besar di deskripsi card · Proyeksi = jumlah nominal
     (Rp ...) di item checklist card yang sama. Digabung per brand+card,
     lalu dinilai: sudah dirinci berapa persen? */
  const pecahMap = {};
  const kunci = (b,c)=>b+'|'+c;
  estDet.forEach(d=>{ const k=kunci(d.brand,d.card);
    if(!pecahMap[k]) pecahMap[k]={brand:d.brand,card:d.card,month:d.month,est:0,proj:0,n:0};
    pecahMap[k].est += d.est||0; });
  detail.forEach(d=>{ const k=kunci(d.brand,d.card);
    if(!pecahMap[k]) pecahMap[k]={brand:d.brand,card:d.card,month:d.month,est:0,proj:0,n:0};
    pecahMap[k].proj += d.nominal||0; pecahMap[k].n++; });
  const pecahArr = Object.keys(pecahMap).map(k=>pecahMap[k]);
  // Toleransi selisih pembulatan: 0,5% dari estimasi (minimal Rp 1.000)
  const statusPecah = p => {
    const sisa = p.est - p.proj;
    const tol  = Math.max(1000, p.est*0.005);
    if(!p.est && p.proj)  return {k:'noest',   urut:1, label:'Estimasi belum diisi', warna:'var(--amber)',  ket:'Sudah ada rincian, tapi patokan estimasinya belum ditulis di deskripsi card.'};
    if(!p.est && !p.proj) return {k:'kosong',  urut:4, label:'Belum ada angka',      warna:'var(--text3)',  ket:'Card ini belum punya estimasi maupun rincian.'};
    if(!p.proj)           return {k:'belum',   urut:2, label:'Belum dirinci',        warna:'var(--red)',    ket:'Estimasi sudah ada, tapi belum satu pun checklist diberi nominal.'};
    if(sisa >  tol)       return {k:'sebagian',urut:3, label:'Baru sebagian',        warna:'var(--amber)',  ket:'Rincian belum menutup seluruh estimasi.'};
    if(sisa < -tol)       return {k:'lebih',   urut:0, label:'Melebihi estimasi',    warna:'var(--red)',    ket:'Jumlah rincian sudah melewati patokan estimasi.'};
    return                       {k:'pas',     urut:5, label:'Terpecah pas',         warna:'var(--green4)', ket:'Rincian sudah pas menutup estimasi.'};
  };
  pecahArr.forEach(p=>{ p.st = statusPecah(p); });
  // Yang perlu perhatian di atas; dalam kelompok sama, nilai terbesar dulu
  pecahArr.sort((a,b)=> a.st.urut-b.st.urut || (b.est||b.proj)-(a.est||a.proj));
  const nPecah = {};
  pecahArr.forEach(p=>{ nPecah[p.st.k]=(nPecah[p.st.k]||0)+1; });
  const dirinciPct = est ? Math.round(proj/est*100) : 0;

  // ── Kartu ringkasan ──────────────────────────────────────────────
  const infoIcon = t => `<span class="info" tabindex="0">i<span class="tip">${t}</span></span>`;
  const TIP = {
    est:  'Angka <b>besar/patokan</b>. Sumber: baris <b>Estimated Budget:</b> di deskripsi card Trello. Ini yang nanti <b>dipecah</b> jadi item-item checklist. Klik kartu untuk lihat dari card mana saja.',
    proj: 'Hasil <b>memecah estimasi</b> jadi item konkret. Sumber: nominal <b>(Rp ...)</b> di item checklist. Idealnya jumlahnya <b>sama dengan Estimasi</b> — kalau masih kurang, berarti belum semua estimasi dirinci. Klik kartu untuk rincian per card.',
    act:  'Uang yang <b>benar-benar keluar</b> (realisasi). Sumber: kolom Budget Aktual di Google Sheets, diisi manual oleh tim. Klik kartu untuk lihat brand/bulan mana yang sudah & belum terisi.',
    vEst: 'Aktual dibandingkan <b>patokan awal</b>. Menjawab: realisasi meleset berapa jauh dari estimasi yang dibuat di awal?',
    vProj:'Aktual dibandingkan <b>rencana terkini</b>. Menjawab: belanja sesuai rencana terakhir atau tidak? Ini yang paling relevan untuk kontrol bulan berjalan.',
    mode: '<b>Bulan card berakhir</b>: seluruh estimasi card ditaruh di bulan due-date-nya — mudah dilacak, tapi <b>tidak sebanding</b> dgn Proyeksi yang tersebar per item.<br><br><b>Ikut sebaran checklist</b>: estimasi dibagi ke bulan-bulan item checklist-nya, jadi sebanding dgn Proyeksi. Total setahun sama saja.',
  };
  // Kartu selisih: pakai kata, bukan cuma angka minus. Kalau aktual belum ada,
  // sengaja NETRAL (bukan hijau) supaya tidak terbaca "hemat" padahal cuma belum dicatat.
  const vCard = (judul, base, baseNama, tip) => {
    const head = `<h3>${judul} ${infoIcon(tip)}</h3>`;
    if(!act)  return `<div class="bcard">${head}<div class="big" style="font-size:17px;color:var(--text3)">—</div>
      <div class="vsub vnetral">belum bisa dihitung — aktual belum terupdate</div></div>`;
    if(!base) return `<div class="bcard">${head}<div class="big" style="font-size:17px;color:var(--text3)">—</div>
      <div class="vsub vnetral">${baseNama} belum diisi, tidak ada pembanding</div></div>`;
    const d=act-base, pct=Math.round(act/base*100), lebih=d>0;
    const warna = d===0 ? 'var(--text2)' : (lebih?'var(--red)':'var(--green4)');
    const kata  = d===0 ? 'pas dengan '+baseNama.toLowerCase() : (lebih?'di atas '+baseNama.toLowerCase():'di bawah '+baseNama.toLowerCase());
    const cls = pct>100?'over':(pct<50?'low':'');
    return `<div class="bcard">${head}
      <div class="big" style="font-size:19px;color:${warna}">${fmtRp(Math.abs(d))}</div>
      <div class="vsub" style="color:${warna}">${kata}</div>
      <div class="bar"><i class="${cls}" style="width:${Math.min(pct,100)}%"></i></div>
      <div class="vsub muted">${pct}% dari ${baseNama.toLowerCase()} terpakai</div></div>`;
  };
  const kartuNilai = (id,judul,nilai,tip,kosongTxt,extra) => `
    <div class="bcard klik${finOpen===id?' on':''}" id="fin-${id}" title="Klik untuk lihat rincian">
      <h3>${judul} ${infoIcon(tip)}</h3>
      <div class="big" style="font-size:22px">${nilai?fmtRp(nilai):`<span class="lap-na">${kosongTxt}</span>`}</div>
      ${extra||''}
      <div class="lihat">${finOpen===id?'▲ tutup rincian':'▼ klik lihat rincian'}</div></div>`;

  // Kartu Proyeksi diberi bar "berapa % estimasi sudah dirinci"
  const barDirinci = !est ? '' : `
    <div class="bar"><i class="${dirinciPct>100?'over':(dirinciPct<50?'low':'')}" style="width:${Math.min(dirinciPct,100)}%"></i></div>
    <div class="vsub muted">${dirinciPct}% dari estimasi sudah dirinci${dirinciPct<100?` · sisa ${fmtRp(Math.max(0,est-proj))}`:''}</div>`;

  const cards = `
    ${kartuNilai('est','Budget Estimasi',est,TIP.est,'belum diisi')}
    ${kartuNilai('proj','Proyeksi (pecahan estimasi)',proj,TIP.proj,'belum ada',barDirinci)}
    ${kartuNilai('act','Budget Aktual',act,TIP.act,'belum terupdate')}
    ${vCard('Selisih vs Estimasi',est,'Estimasi',TIP.vEst)}
    ${vCard('Selisih vs Proyeksi',proj,'Proyeksi',TIP.vProj)}
    <div class="bcard"><h3>Task / Selesai / Overdue</h3><div class="statrow" style="margin-top:6px">
      <span class="chip plan">${task} task</span><span class="chip done">✓ ${done}</span><span class="chip cancel" style="background:var(--red-bg);color:var(--red)">⚠ ${ovd}</span></div></div>`;

  // ── Tabel Pecahan Estimasi ───────────────────────────────────────
  const pRowsPecah = pecahArr.map(p=>{
    const st=p.st, sisa=p.est-p.proj;
    const pct = p.est ? Math.round(p.proj/p.est*100) : (p.proj?100:0);
    const barCls = pct>100?'over':(pct<50?'low':'');
    const sisaTxt = !p.est ? '<span class="lap-na">—</span>'
      : sisa>0 ? `<span style="color:var(--amber)">${fmtRp(sisa)}</span>`
      : sisa<0 ? `<span style="color:var(--red)">lebih ${fmtRp(-sisa)}</span>`
      : '<span style="color:var(--green4)">—</span>';
    return `<tr>
      <td>${p.card||'—'}</td><td>${p.brand}</td><td><b>${p.month||'—'}</b></td>
      <td class="r num">${p.est?fmtRp(p.est):'<span class="lap-na">belum diisi</span>'}</td>
      <td class="r num">${p.proj?fmtRp(p.proj):'<span class="lap-na">belum dirinci</span>'}</td>
      <td class="r num">${sisaTxt}</td>
      <td style="min-width:110px">
        <div class="bar" style="margin-top:0"><i class="${barCls}" style="width:${Math.min(pct,100)}%"></i></div>
        <div class="vsub muted" style="margin-top:2px">${p.est?pct+'%':'—'} · ${p.n} item</div></td>
      <td><span class="pill" style="background:transparent;border:1px solid ${st.warna};color:${st.warna}" title="${st.ket}">${st.label}</span></td>
    </tr>`;
  }).join('') || '<tr><td colspan="8" class="muted" style="text-align:center;padding:20px">Belum ada card dengan estimasi maupun rincian untuk filter ini.</td></tr>';

  const chip=(k,label,warna)=> nPecah[k] ? `<span class="chip" style="background:transparent;border:1px solid ${warna};color:${warna}">${label}: ${nPecah[k]}</span>` : '';
  const pecahSection = `
    <div class="section-title">🧩 Pecahan Estimasi — sudah dirinci berapa?</div>
    <div class="muted" style="margin:-4px 0 8px;font-size:12px">
      <b>Proyeksi adalah pecahan dari Budget Estimasi.</b> Estimasi ditulis sekali di deskripsi card (<code>Estimated Budget:</code>),
      lalu dipecah jadi item checklist bernominal <code>(Rp ...)</code>. Kalau semua sudah dirinci, jumlah pecahan = estimasi.
      Tabel ini menunjukkan card mana yang <b>belum selesai dipecah</b>.</div>
    <div class="statrow" style="margin-bottom:8px">
      ${chip('lebih','⚠ Melebihi estimasi','var(--red)')}
      ${chip('belum','● Belum dirinci','var(--red)')}
      ${chip('noest','◐ Estimasi belum diisi','var(--amber)')}
      ${chip('sebagian','◐ Baru sebagian','var(--amber)')}
      ${chip('pas','✓ Terpecah pas','var(--green4)')}
      ${chip('kosong','○ Belum ada angka','var(--text3)')}
    </div>
    <div class="tablewrap"><table>
      <thead><tr><th>Card / Agenda</th><th>Brand</th><th>Bulan</th><th class="r">Estimasi</th><th class="r">Sudah dirinci</th><th class="r">Sisa</th><th>Kelengkapan</th><th>Status</th></tr></thead>
      <tbody>${pRowsPecah}</tbody></table></div>
    <div class="ins-foot">Diurutkan: yang paling perlu diperbaiki di atas. <b>Sisa</b> = bagian estimasi yang belum dituangkan jadi item checklist. Rincian tiap item ada di tabel <b>Rincian Pengeluaran</b> di bawah.</div>`;

  // Peringatan: dalam mode 'akhir', Est & Proyeksi per bulan TIDAK sebanding.
  const modeNote = estMode==='akhir'
    ? `<div class="note" style="margin:-4px 0 8px;font-size:12px;background:var(--gold-bg);border:1px solid #e8d49a;border-radius:8px;padding:8px 10px;color:var(--text2)">
         ⚠️ <b>Kolom "Selisih vs Est." di tabel ini belum sebanding.</b> Estimasi sedang dihitung <b>penuh di bulan card berakhir</b>,
         sedangkan Proyeksi tersebar mengikuti deadline tiap item checklist. Jadi card yang berakhir bulan X tapi checklist-nya
         tersebar beberapa bulan akan terlihat "selisih besar" di bulan X — padahal bisa jadi sudah dirinci lengkap.<br>
         Ganti <b>Estimasi per bulan → “Ikut sebaran checklist”</b> di kanan atas supaya sebanding, atau lihat perbandingan
         yang jujur per card di tabel <b>🧩 Pecahan Estimasi</b> di atas.</div>`
    : `<div class="note" style="margin:-4px 0 8px;font-size:12px">Estimasi dibagi ke bulan-bulan item checklist-nya (proporsional terhadap nominal), jadi <b>sebanding</b> dengan Proyeksi. Total setahun tetap sama.</div>`;

  // Per brand table
  const brandsToShow = f.brand==='(Semua)' ? BR : [f.brand];
  const bRows = brandsToShow.map(b=>{
    const br = flt.filter(r=>r.brand===b);
    const e=estJumlah(b), p=sum(br,'proj'), a=sum(br,'act');
    return `<tr><td><b>${b}</b></td><td class="r num">${e?fmtRp(e):'<span class="lap-na">belum diisi</span>'}</td><td class="r num">${p?fmtRp(p):'<span class="lap-na">belum ada</span>'}</td><td class="r num">${a?fmtRp(a):'<span class="lap-na">belum terupdate</span>'}</td>
      <td class="r num">${vCell(a,e)}</td>
      <td class="r num">${vCell(a,p)}</td>
      <td class="r num">${sum(br,'contentOutput')}</td><td class="r num">${sum(br,'taskCount')}</td>
      <td class="r num" style="color:${sum(br,'overdueCount')>0?'var(--red)':'var(--green4)'}">${sum(br,'overdueCount')}</td></tr>`;
  }).join('');

  // Per month table
  const byMonth = {};
  flt.forEach(r=>{ (byMonth[r.month]=byMonth[r.month]||[]).push(r); });
  const mRows = Object.keys(byMonth).sort((a,b)=>MONTHS.indexOf(a)-MONTHS.indexOf(b)).map(m=>{
    const mr=byMonth[m];
    const e=estJumlah(null,m), p=sum(mr,'proj'), a=sum(mr,'act');
    return `<tr><td><b>${m}</b></td><td class="r num">${e?fmtRp(e):'<span class="lap-na">belum diisi</span>'}</td><td class="r num">${p?fmtRp(p):'<span class="lap-na">belum ada</span>'}</td><td class="r num">${a?fmtRp(a):'<span class="lap-na">belum terupdate</span>'}</td>
      <td class="r num">${vCell(a,e)}</td>
      <td class="r num">${vCell(a,p)}</td>
      <td class="r num">${sum(mr,'contentOutput')}</td><td class="r num">${sum(mr,'taskCount')}</td></tr>`;
  }).join('') || '<tr><td colspan="8" class="muted" style="text-align:center;padding:20px">Belum ada data untuk filter ini.</td></tr>';



  // Panel Proyeksi: ringkasan per card (rinci per checklist ada di tabel bawah)
  const pMap = {};
  detail.forEach(d=>{ const k=d.brand+'|'+d.card+'|'+d.month;
    if(!pMap[k]) pMap[k]={brand:d.brand,card:d.card,month:d.month,n:0,total:0};
    pMap[k].n++; pMap[k].total+=(d.nominal||0); });
  const pArr = Object.values(pMap).sort((a,b)=>b.total-a.total);
  const pRows = pArr.map(p=>
    `<tr><td>${p.card||'—'}</td><td>${p.brand}</td><td><b>${p.month||'—'}</b></td><td class="r">${p.n}</td><td class="r num">${fmtRp(p.total)}</td></tr>`
  ).join('') || '<tr><td colspan="5" class="muted" style="text-align:center;padding:20px">Belum ada nominal di checklist untuk filter ini.</td></tr>';
  const projPanel = finOpen!=='proj' ? '' : `
    <div class="section-title">🔎 Rincian Proyeksi — dari card mana saja</div>
    <div class="muted" style="margin:-4px 0 10px;font-size:12px">Dijumlahkan dari nominal <b>(Rp ...)</b> di item checklist Trello, dihitung di bulan deadline tiap item. Rincian per item ada di tabel <b>Rincian Pengeluaran</b> di bawah.</div>
    <div class="tablewrap"><table><thead><tr><th>Card / Agenda</th><th>Brand</th><th>Bulan</th><th class="r">Jml Item</th><th class="r">Proyeksi</th></tr></thead><tbody>${pRows}<tr><td colspan="4" class="r"><b>Total</b></td><td class="r num"><b>${fmtRp(pArr.reduce((s,p)=>s+p.total,0))}</b></td></tr></tbody></table></div>`;

  // Panel Aktual: brand/bulan mana yang sudah & belum diisi
  const aIsi   = flt.filter(r=>(r.act||0)>0).sort((a,b)=>(b.act||0)-(a.act||0));
  const aKosong= flt.filter(r=>!(r.act||0) && ((r.proj||0)>0||(r.est||0)>0));
  const aRows = aIsi.map(r=>
    `<tr><td><b>${r.month}</b></td><td>${r.brand}</td><td class="r num">${fmtRp(r.proj)}</td><td class="r num">${fmtRp(r.act)}</td><td class="r num" style="color:${(r.act-r.proj)>0?'var(--red)':'var(--green4)'}">${r.proj?Math.round(r.act/r.proj*100)+'%':'—'}</td></tr>`
  ).join('') || '<tr><td colspan="5" class="muted" style="text-align:center;padding:20px">Belum ada realisasi tercatat untuk filter ini.</td></tr>';
  const actPanel = finOpen!=='act' ? '' : `
    <div class="section-title">🔎 Rincian Budget Aktual — sudah &amp; belum terupdate</div>
    <div class="muted" style="margin:-4px 0 10px;font-size:12px">Aktual <b>diisi manual</b> di Google Sheets (kolom Budget Aktual), tidak otomatis dari Trello. Karena itu angka kosong berarti <b>belum dicatat</b> — belum tentu belum ada pengeluaran.</div>
    <div class="tablewrap"><table><thead><tr><th>Bulan</th><th>Brand</th><th class="r">Proyeksi</th><th class="r">Aktual</th><th class="r">Terpakai</th></tr></thead><tbody>${aRows}</tbody></table></div>
    ${aKosong.length?`<div class="note" style="margin-top:8px;font-size:12px;color:var(--text3)"><b>${aKosong.length} baris punya rencana tapi aktualnya masih kosong:</b> ${aKosong.slice(0,8).map(r=>r.brand+' — '+r.month).join(' · ')}${aKosong.length>8?' …+'+(aKosong.length-8)+' lagi':''}</div>`:''}`;

  $('#content').innerHTML = `
    <div class="toolbar">
      <span class="lbl">Brand</span><select id="cBrand">${opt(brandOpts,f.brand)}</select>
      <span class="lbl">Dari</span><select id="cFrom">${opt(monthOpts,f.from)}</select>
      <span class="lbl">Sampai</span><select id="cTo">${opt(monthOpts,f.to)}</select>
      <span style="flex:1"></span>
      <span class="lbl">Estimasi per bulan ${infoIcon(TIP.mode)}</span>
      <select id="cEstMode">
        <option value="akhir"${estMode==='akhir'?' selected':''}>Bulan card berakhir</option>
        <option value="sebar"${estMode==='sebar'?' selected':''}>Ikut sebaran checklist</option>
      </select>
    </div>
    <div class="section-title">📊 Ringkasan ${finData.year}</div>
    <div class="muted" style="margin:-4px 0 10px;font-size:12px">Arahkan ke ikon <span class="info" tabindex="0">i</span> di tiap kartu untuk tahu arti &amp; sumber angkanya · klik kartu untuk lihat rinciannya.</div>
    <div class="brandgrid">${cards}</div>
    ${estPanel}${projPanel}${actPanel}
    ${pecahSection}
    <div class="section-title">🏢 Per Brand</div>
    <div class="tablewrap"><table><thead><tr><th>Brand</th><th class="r">Budget Est.</th><th class="r">Proyeksi</th><th class="r">Budget Aktual</th><th class="r">Selisih vs Est.</th><th class="r">Selisih vs Proy.</th><th class="r">Content</th><th class="r">Task</th><th class="r">Overdue</th></tr></thead><tbody>${bRows}</tbody></table></div>
    <div class="section-title">🧾 Rincian Pengeluaran (Proyeksi Checklist)</div>
    <div class="tablewrap"><table><thead><tr><th>Bulan</th><th>Brand</th><th id="thFinCard" style="cursor:pointer;user-select:none">Task / Card <span style="opacity:.6">${finCardArrow}</span></th><th>Checklist</th><th>Tanggal</th><th class="r">Nominal</th></tr></thead><tbody>${dRows}<tr><td colspan="5" class="r"><b>Total</b></td><td class="r num"><b>${fmtRp(detailTotal)}</b></td></tr></tbody></table></div>
    <div class="section-title">📅 Per Bulan</div>
    ${modeNote}
    <div class="tablewrap"><table><thead><tr><th>Bulan</th><th class="r">Budget Est.</th><th class="r">Proyeksi</th><th class="r">Budget Aktual</th><th class="r">Selisih vs Est.</th><th class="r">Selisih vs Proy.</th><th class="r">Content</th><th class="r">Task</th></tr></thead><tbody>${mRows}</tbody></table></div>`;
  $('#cBrand').onchange=e=>{f.brand=e.target.value;renderFinance();};
  $('#cFrom').onchange=e=>{f.from=e.target.value;renderFinance();};
  $('#cTo').onchange=e=>{f.to=e.target.value;renderFinance();};
  $('#cEstMode').onchange=e=>{estMode=e.target.value;renderFinance();};
  $('#thFinCard').onclick=()=>{ finCardSort = finCardSort===1 ? -1 : (finCardSort===-1 ? 0 : 1); renderFinance(); };
  // Klik kartu = buka/tutup panel rinciannya (satu panel terbuka pada satu waktu)
  ['est','proj','act'].forEach(id=>{
    const el=$('#fin-'+id); if(!el) return;
    el.onclick=()=>{ finOpen = finOpen===id ? '' : id; renderFinance(); };
  });
  posisiTooltip();
}

// Tooltip ⓘ default keluar di tengah-atas ikon. Kalau ikonnya mepet tepi layar,
// itu bikin halaman bisa di-scroll ke samping — jadi arahnya dibalik.
function posisiTooltip(scope){
  const vw = document.documentElement.clientWidth || window.innerWidth;
  (scope||document).querySelectorAll('.info .tip').forEach(t=>{
    t.classList.remove('ki','ka');
    const ic = t.parentElement.getBoundingClientRect();
    const w  = t.offsetWidth || 235;
    if(ic.left + ic.width/2 + w/2 > vw - 8)     t.classList.add('ki');
    else if(ic.left + ic.width/2 - w/2 < 8)     t.classList.add('ka');
  });
}
window.addEventListener('resize', ()=>posisiTooltip());

/* ===== MARKETING (rich, filter brand + bulan) ===== */
function renderMarketing(){
  const rows = mktData.rows, f = mktFilt;
  const flt = rows.filter(r =>
    (f.brand==='(Semua)'||r.brand===f.brand) &&
    (f.month==='(Semua)'||r.month===f.month));

  const opt=(arr,sel)=>arr.map(v=>`<option ${v===sel?'selected':''}>${v}</option>`).join('');
  const brandOpts=['(Semua)'].concat(BR), monthOpts=['(Semua)'].concat(MONTHS);

  const sum=(k)=>flt.reduce((s,x)=>s+(x[k]||0),0);
  const avg=(k)=>flt.length?(flt.reduce((s,x)=>s+(x[k]||0),0)/flt.length):0;

  // Pembanding vs bulan kalender sebelumnya (hanya saat 1 bulan dipilih)
  const monthSel = f.month!=='(Semua)';
  const prevMonth = (monthSel && MONTHS.indexOf(f.month)>0) ? MONTHS[MONTHS.indexOf(f.month)-1] : null;
  const prevRows = prevMonth ? rows.filter(r=>(f.brand==='(Semua)'||r.brand===f.brand) && r.month===prevMonth) : [];
  const hasPrev = !!(monthSel && prevMonth && prevRows.length);
  const sumP=(k)=>prevRows.reduce((s,x)=>s+(x[k]||0),0);
  const avgP=(k)=>prevRows.length?(prevRows.reduce((s,x)=>s+(x[k]||0),0)/prevRows.length):0;
  const delta=(cur,prev,isPct)=>{
    if(!monthSel) return '';
    if(!hasPrev) return `<div class="muted" style="font-size:11px;margin-top:5px">— belum ada data ${prevMonth||'bulan sebelumnya'}</div>`;
    const d=cur-prev, up=d>=0;
    const val=isPct?((d>=0?'+':'')+d.toFixed(2)+'pp'):((d>=0?'+':'')+fmtNum(d));
    return `<div style="font-size:11px;margin-top:5px;color:${up?'var(--green4)':'var(--red)'}">${up?'▲':'▼'} ${val} <span style="color:var(--muted)">vs ${prevMonth}</span></div>`;
  };

  const cards = `
    <div class="bcard"><h3>Total Reach</h3><div class="big" style="font-size:23px">${fmtNum(sum('reach'))}</div>${delta(sum('reach'),sumP('reach'),false)}</div>
    <div class="bcard"><h3>Total Views</h3><div class="big" style="font-size:23px">${fmtNum(sum('views'))}</div>${delta(sum('views'),sumP('views'),false)}</div>
    <div class="bcard"><h3>Avg ER%</h3><div class="big" style="font-size:23px">${avg('avgER').toFixed(2)}%</div>${delta(avg('avgER'),avgP('avgER'),true)}</div>
    <div class="bcard"><h3>New Follows</h3><div class="big" style="font-size:23px">${fmtNum(sum('follows'))}</div>${delta(sum('follows'),sumP('follows'),false)}</div>`;

  const tb = flt.length ? flt.map(r=>`
    <tr><td><b>${r.brand}</b></td><td>${r.month} ${r.year}</td><td class="r num">${fmtNum(r.posts)}</td>
    <td class="r num">${fmtNum(r.reach)}</td><td class="r num">${fmtNum(r.views)}</td><td class="r num">${fmtNum(r.likes)}</td>
    <td class="r num">${fmtNum(r.saves)}</td><td class="r num">${fmtNum(r.follows)}</td>
    <td class="r num">${(r.avgER||0).toFixed(2)}%</td><td class="r num">${r.storyER===null?'—':r.storyER.toFixed(2)+'%'}</td></tr>`).join('')
    : '<tr><td colspan="10" class="muted" style="text-align:center;padding:24px">Tidak ada data.</td></tr>';

  $('#content').innerHTML = `
    <div class="toolbar">
      <span class="lbl">Brand</span><select id="mBrand">${opt(brandOpts,f.brand)}</select>
      <span class="lbl">Bulan</span><select id="mMonth">${opt(monthOpts,f.month)}</select>
    </div>
    <div class="section-title">📊 Ringkasan KPI</div>
    <div class="brandgrid">${cards}</div>
