<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NRN — Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
 --green:#233a2c;--green2:#2f4d3a;--green3:#3f6b4a;--green4:#2d6a4f;--green-bg:#e6f1ea;
 --gold:#c8a96e;--gold2:#e8c98e;--gold-bg:#f5ecd8;
 --cream:#f6f2ea;--cream2:#ece5d8;--cream3:#e0d8c8;--white:#fff;
 --red:#9b2226;--red-bg:#f7e3e3;--amber:#7f5000;--amber-bg:#fff0cc;
 --text:#241c12;--text2:#4f4534;--text3:#8a8170;
 --radius:13px;--shadow:0 4px 22px rgba(35,40,30,.10);
}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);-webkit-font-smoothing:antialiased;font-size:14px;line-height:1.5}
.num{font-family:'DM Mono',monospace;font-variant-numeric:tabular-nums}
.header{background:var(--green);padding:18px 30px 0;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;top:-70px;right:-30px;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,rgba(200,169,110,.18),transparent 70%)}
.header-in{max-width:1240px;margin:0 auto;position:relative}
.htop{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.2em;color:var(--gold);text-transform:uppercase;margin-bottom:4px}
.header h1{font-family:'DM Serif Display',serif;font-size:23px;color:#fff;line-height:1.1}
.header h1 em{color:var(--gold2);font-style:normal}
.spacer{flex:1}
.btn{height:34px;padding:0 14px;border:none;border-radius:9px;font-family:inherit;font-size:12.5px;font-weight:600;cursor:pointer}
.btn-gold{background:var(--gold);color:#3a2a10}.btn-gold:hover{background:var(--gold2)}
/* tabs */
.tabs{display:flex;gap:4px;margin-top:14px;flex-wrap:wrap}
.tab{background:transparent;border:0;color:rgba(255,255,255,.6);padding:11px 18px;cursor:pointer;font-family:inherit;font-size:13.5px;font-weight:600;border-radius:10px 10px 0 0;border-bottom:3px solid transparent}
.tab:hover{color:#fff}
.tab.on{background:var(--cream);color:var(--green);border-bottom-color:var(--gold)}
.wrap{max-width:1240px;margin:0 auto;padding:22px 20px 70px}
.section-title{font-family:'DM Serif Display',serif;font-size:18px;color:var(--green);font-weight:400;margin:20px 0 11px}
/* brand cards (agenda) */
.brandgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:13px}
@media(max-width:900px){.brandgrid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:520px){.brandgrid{grid-template-columns:1fr}}
.bcard{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:15px 17px;border-top:3px solid var(--gold)}
.bcard h3{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--green4);font-weight:500;margin-bottom:8px}
.bcard .big{font-family:'DM Serif Display',serif;font-size:29px;color:var(--green);line-height:1}
.bcard .biglbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
.statrow{display:flex;gap:6px;flex-wrap:wrap}
.chip{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px}
.chip.done{background:var(--green-bg);color:var(--green4)}.chip.prog{background:var(--gold-bg);color:var(--amber)}
.chip.plan{background:var(--cream2);color:var(--text2)}.chip.month{background:var(--green);color:#fff}
/* toolbar */
.toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:11px}
.toolbar select{height:36px;padding:0 11px;border-radius:9px;border:1.5px solid var(--cream2);background:var(--cream);color:var(--text);font-size:13px;font-family:inherit}
.toolbar select:focus{outline:none;border-color:var(--green4);background:#fff}
.toolbar .lbl{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--text3)}
.tag{font-size:11px;color:var(--text3)}
/* tables */
.tablewrap{overflow:auto;border:1px solid var(--cream2);border-radius:var(--radius);background:var(--white);box-shadow:var(--shadow);margin-bottom:8px}
table{width:100%;border-collapse:collapse;font-size:12.8px}
thead th{text-align:left;color:var(--text3);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.05em;font-family:'DM Mono',monospace;padding:11px 12px;border-bottom:1.5px solid var(--cream2);white-space:nowrap;background:var(--cream)}
tbody td{padding:10px 12px;border-bottom:1px solid var(--cream2);white-space:nowrap}
tbody tr:hover{background:var(--cream)}
td.r,th.r{text-align:right}
.pill{font-size:10.5px;font-weight:700;padding:2px 9px;border-radius:999px;display:inline-block}
.pill.done{background:var(--green-bg);color:var(--green4)}.pill.prog{background:var(--gold-bg);color:var(--amber)}
.pill.plan{background:var(--cream2);color:var(--text2)}
.pill.deal{background:var(--green-bg);color:var(--green4)}.pill.wait{background:var(--gold-bg);color:var(--amber)}
.pill.cancel{background:var(--red-bg);color:var(--red)}
.pill.sampling{background:#ece4f7;color:#5b3a8e}
.chip.samp{background:#ece4f7;color:#5b3a8e}
/* Insight otomatis */
.ins-box{background:var(--white);border:1.5px solid var(--cream2);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
.ins-head{font-weight:700;font-size:13px;margin-bottom:12px;color:var(--text2)}
.ins-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px}
.ins-col{border:1.5px solid var(--cream2);border-radius:10px;padding:11px 12px;background:var(--cream)}
.ins-col.good{border-color:#bfe0cc;background:var(--green-bg)}
.ins-col.warn{border-color:#e8d49a;background:var(--gold-bg)}
.ins-col.act{border-color:#e8b9b9;background:var(--red-bg)}
.ins-col h4{font-size:12px;margin-bottom:7px}
.ins-n{font-family:'DM Mono',monospace;opacity:.6;font-weight:400}
.ins-col ul{margin:0;padding-left:16px}
.ins-col li{font-size:12.5px;line-height:1.55;margin-bottom:6px}
.ins-tag{display:inline-block;font-size:9.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:1px 5px;border-radius:4px;background:rgba(0,0,0,.07);margin-right:3px}
.ins-col code{font-family:'DM Mono',monospace;font-size:11px;background:rgba(0,0,0,.06);padding:1px 4px;border-radius:3px}
.ins-empty{font-size:12px;color:var(--text3)}
.ins-foot{margin-top:11px;font-size:11.5px;color:var(--text3);line-height:1.5}
.dl{font-family:'DM Mono',monospace;font-weight:600}
.dl.red{color:var(--red)}.dl.amber{color:var(--amber)}.dl.green{color:var(--green4)}
.muted{color:var(--text3)}
/* generic grid banner */
.gbanner{background:var(--green);color:#fff;font-family:'DM Serif Display',serif;font-size:15px;padding:11px 14px;border-radius:10px;margin:16px 0 9px}
.gsub{background:var(--green-bg);color:var(--green);font-weight:700;padding:9px 14px;border-radius:9px;margin:12px 0 8px;font-size:13px}
.loading{text-align:center;padding:50px;color:var(--text3)}
.spin{display:inline-block;animation:spin 1s linear infinite;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
/* login */
#gate{position:fixed;inset:0;background:linear-gradient(160deg,var(--green),var(--green2));display:grid;place-items:center;z-index:100;padding:20px}
.gatecard{background:var(--white);border-radius:16px;box-shadow:0 20px 55px rgba(0,0,0,.3);padding:30px 32px;width:min(400px,94vw)}
.gatecard .eb{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.2em;color:var(--gold);text-transform:uppercase;margin-bottom:5px}
.gatecard h2{font-family:'DM Serif Display',serif;font-size:23px;color:var(--green);font-weight:400;margin-bottom:3px}
.gatecard p{color:var(--text3);font-size:12.5px;margin-bottom:18px}
.gatecard input{width:100%;height:44px;padding:0 13px;border:1.5px solid var(--cream2);border-radius:10px;background:var(--cream);font-size:14px;font-family:inherit;color:var(--text);outline:none;margin-bottom:12px}
.gatecard input:focus{border-color:var(--green4);background:#fff}
.gatecard button{width:100%;height:44px;border:none;border-radius:10px;background:var(--gold);color:#3a2a10;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer}
.gatecard button:hover{background:var(--gold2)}
.gateErr{background:var(--red-bg);color:var(--red);border-radius:9px;padding:9px 12px;font-size:12.5px;margin-bottom:12px;display:none}
.gateErr.show{display:block}
</style>
</head>
<body>

<!-- LOGIN GATE (BOD) -->
<div id="gate">
  <div class="gatecard">
    <div class="eb">NRN Holding · Board of Directors</div>
    <h2>NRN Dashboard</h2>
    <p>Akses khusus BOD. Masukkan password.</p>
    <div class="gateErr" id="gateErr"></div>
    <input type="password" id="gatePw" placeholder="Password BOD" />
    <button id="gateBtn">Masuk →</button>
  </div>
</div>

<div class="header">
  <div class="header-in">
    <div class="htop">
      <div>
        <div class="eyebrow">NRN Holding · Live from Google Sheets</div>
        <h1>NRN <em>Dashboard</em></h1>
      </div>
      <div class="spacer"></div>
      <span class="tag" id="subInfo" style="color:rgba(255,255,255,.5)"></span>
      <button class="btn btn-gold" id="refreshBtn">↻ Refresh</button>
    </div>
    <div class="tabs" id="tabs"></div>
  </div>
</div>

<div class="wrap">
  <div id="content"><div class="loading"><span class="spin">⏳</span> Memuat…</div></div>
</div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyxK1M5xtaXSUO2_J5wbVPsc5QYsEIuIxrFCpFttce-KvSuTV7rkb9NSRxye5cIS2QX/exec';
const MONTHS = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];

const TABS = [
  { id:'agenda',    label:'📌 Agenda Accomplishment', type:'agenda' },
  { id:'inquiry',   label:'📋 Inquiry',              type:'inquiry' },
  { id:'finance',   label:'💰 Agenda (Finance)',     type:'finance' },
  { id:'marketing', label:'📊 Marketing (Socmed KPI)', type:'marketing' },
  { id:'agency',    label:'🏢 Agency',               type:'agency' },
  { id:'laporan',   label:'📄 Laporan',              type:'laporan' },
];
const BR = ['Revolt Industry','Radja Leather','Rove Gifts','Winddam ID'];

let active = 'agenda';
let agendaFilt = { brand:'(Semua)', bulan:'(Semua)', status:'(Semua)' };
let agendaData = null;
let inqFilt = { brand:'(Semua)', status:'(Semua)' };
let inqData = null;
let finFilt = { brand:'(Semua)', from:'(Semua)', to:'(Semua)' };
let finData = null;
let finCardSort = 0; // 0=default, 1=asc, -1=desc (kolom Task/Card Rincian)
let estOpen = false; // rincian Budget Estimasi per card (klik kartu Estimasi)
let mktFilt = { brand:'Revolt Industry', month:'(Semua)' };
let mktData = null;
let agFilt = { brand:'(Semua)', bulan:'(Semua)' };
const ALL_BRANDS = '(Semua Brand)';
let lapFilt = { brand:ALL_BRANDS, month: MONTHS[new Date().getMonth()] };
let lapNotes = { wins:'', losses:'', opportunity:'', problem:'' };
const cache = {};
const fmtRp = n => 'Rp ' + (Number(n)||0).toLocaleString('id-ID');
const fmtNum = n => (Number(n)||0).toLocaleString('id-ID');
const $ = s => document.querySelector(s);

let BOD_PW = '';
const PW = () => '&password=' + encodeURIComponent(BOD_PW);

function renderTabs(){
  $('#tabs').innerHTML = TABS.map(t =>
    `<button class="tab ${t.id===active?'on':''}" data-tab="${t.id}">${t.label}</button>`).join('');
  document.querySelectorAll('[data-tab]').forEach(b => b.onclick = () => { active = b.dataset.tab; load(); });
}

async function load(force){
  renderTabs();
  const tab = TABS.find(t => t.id===active);
  $('#content').innerHTML = '<div class="loading"><span class="spin">⏳</span> Memuat…</div>';
  try{
    if(tab.type==='agenda'){
      if(force || !agendaData){ const r = await fetch(APPS_SCRIPT_URL+'?action=getAgenda'+PW()); agendaData = await r.json(); }
      if(!agendaData.success) throw new Error(agendaData.error);
      $('#subInfo').textContent = 'Bulan ini: '+agendaData.bulanIni;
      renderAgenda();
    } else if(tab.type==='inquiry'){
      if(force || !inqData){ const r = await fetch(APPS_SCRIPT_URL+'?action=getInquiryAll'+PW()); inqData = await r.json(); }
      if(!inqData.success) throw new Error(inqData.error);
      $('#subInfo').textContent = inqData.detail.length+' inquiry';
      renderInquiry();
    } else if(tab.type==='finance'){
      if(force || !finData){ const r = await fetch(APPS_SCRIPT_URL+'?action=getFinanceAll'+PW()); finData = await r.json(); }
      if(!finData.success) throw new Error(finData.error);
      $('#subInfo').textContent = 'Tahun '+finData.year;
      renderFinance();
    } else if(tab.type==='marketing'){
      if(force || !mktData){ const r = await fetch(APPS_SCRIPT_URL+'?action=getMarketingAll'+PW()); mktData = await r.json(); }
      if(!mktData.success) throw new Error(mktData.error);
      $('#subInfo').textContent = mktData.rows.length+' laporan';
      renderMarketing();
    } else if(tab.type==='agency'){
      if(force || !finData){ const r = await fetch(APPS_SCRIPT_URL+'?action=getFinanceAll'+PW()); finData = await r.json(); }
      if(!finData.success) throw new Error(finData.error);
      $('#subInfo').textContent = 'Penggunaan agency';
      renderAgency();
    } else if(tab.type==='laporan'){
      if(force || !agendaData){ const r = await fetch(APPS_SCRIPT_URL+'?action=getAgenda'+PW()); agendaData = await r.json(); }
      if(force || !finData){ const r = await fetch(APPS_SCRIPT_URL+'?action=getFinanceAll'+PW()); finData = await r.json(); }
      if(force || !mktData){ const r = await fetch(APPS_SCRIPT_URL+'?action=getMarketingAll'+PW()); mktData = await r.json(); }
      if(force || !inqData){ const r = await fetch(APPS_SCRIPT_URL+'?action=getInquiryAll'+PW()); inqData = await r.json(); }
      $('#subInfo').textContent = 'Laporan bulanan';
      renderLaporan();
    } else {
      if(force) delete cache[tab.sheet];
      if(!cache[tab.sheet]){ const r = await fetch(APPS_SCRIPT_URL+'?action=getSheet&name='+encodeURIComponent(tab.sheet)+PW()); cache[tab.sheet] = await r.json(); }
      const d = cache[tab.sheet];
      if(!d.success) throw new Error(d.error);
      $('#subInfo').textContent = '';
      renderGrid(d.values);
    }
  }catch(e){
    $('#content').innerHTML = '<div class="loading">⚠️ Gagal memuat.<br><small>'+(e.message||e)+'</small><br><small>Pastikan Web App sudah di-deploy ulang.</small></div>';
  }
}

/* ===== AGENDA (rich) ===== */
// Normalisasi status → 4 label (kompatibel nilai lama Planned/On Progress)
function statusLabel(st){
  const z = String(st||'');
  if(z==='Done') return 'Done';
  if(z==='In Progress' || z==='On Progress') return 'In Progress';
  if(z.indexOf('Checklist')>=0 || z==='Planned') return 'Checklist Created';
  if(z.indexOf('Task')>=0) return 'Task Created';
  return z || '—';
}
function statusPill(st){
  const L = statusLabel(st);
  if(L==='Done')             return '<span class="pill done">Done</span>';
  if(L==='In Progress')      return '<span class="pill prog">In Progress</span>';
  if(L==='Checklist Created')return '<span class="pill" style="background:#e3eef5;color:#1d4e6f">Checklist Created</span>';
  if(L==='Task Created')     return '<span class="pill plan">Task Created</span>';
  return '<span class="pill plan">'+L+'</span>';
}
function sisaCls(n){ if(n===null) return ''; if(n<=3) return 'red'; if(n<=7) return 'amber'; return 'green'; }
let agendaSort = 0; // 0=off, 1=asc, -1=desc (kolom Card/Agenda)

function renderAgenda(){
  const D = agendaData, f = agendaFilt;
  const cards = D.summary.map(b => `
    <div class="bcard"><h3>${b.brand}</h3>
      <div class="big">${b.total}</div><div class="biglbl">Total Agenda</div>
      <div class="statrow">
        <span class="chip month">📅 ${b.bulanIni}</span>
        <span class="chip done">✓ ${b.done}</span>
        <span class="chip prog">◐ ${b.onProgress}</span>
        <span class="chip plan">○ ${b.planned}</span>
      </div></div>`).join('');
  const brandOpts = ['(Semua)'].concat(D.summary.map(b=>b.brand));
  const bulanSet = ['(Semua)'].concat([...new Set(D.detail.map(d=>d.bulan).filter(Boolean))].sort((a,b)=>MONTHS.indexOf(a)-MONTHS.indexOf(b)));
  const STATUS_ORDER = ['Task Created','Checklist Created','In Progress','Done'];
  const statusPresent = [...new Set(D.detail.map(d=>statusLabel(d.status)).filter(Boolean))]
    .sort((a,b)=>STATUS_ORDER.indexOf(a)-STATUS_ORDER.indexOf(b));
  const statusOpts = ['(Semua)'].concat(statusPresent);
  const opt=(arr,sel)=>arr.map(v=>`<option ${v===sel?'selected':''}>${v}</option>`).join('');
  let rows = D.detail.filter(d =>
    (f.brand==='(Semua)'||d.brand===f.brand)&&(f.bulan==='(Semua)'||d.bulan===f.bulan)&&(f.status==='(Semua)'||statusLabel(d.status)===f.status));
  if(agendaSort!==0) rows = [...rows].sort((a,b)=> agendaSort * String(a.card||'').localeCompare(String(b.card||'')));
  const sortArrow = agendaSort===0 ? '↕' : (agendaSort===1 ? '▲' : '▼');
  const tb = rows.length ? rows.map(d=>`
    <tr><td><b>${d.brand}</b></td><td>${d.card||'—'}</td><td>${d.subtask||'—'}</td><td>${d.bulan||'—'}</td>
    <td class="dl">${d.deadline||'—'}</td><td class="dl ${statusLabel(d.status)==='Done'?'green':sisaCls(d.sisaHari)}">${statusLabel(d.status)==='Done'?'✓ Completed':(d.sisaHari===null?'—':d.sisaHari+' hari')}</td>
    <td>${statusPill(d.status)}</td><td class="muted">${d.pic||'—'}</td></tr>`).join('')
    : '<tr><td colspan="8" class="muted" style="text-align:center;padding:24px">Tidak ada data.</td></tr>';
  $('#content').innerHTML = `
    <div class="section-title">📊 Summary Pencapaian</div>
    <div class="brandgrid">${cards}</div>
    <div class="section-title">📑 Checklist &amp; Deadline</div>
    <div class="toolbar">
      <span class="lbl">Brand</span><select id="fBrand">${opt(brandOpts,f.brand)}</select>
      <span class="lbl">Bulan</span><select id="fBulan">${opt(bulanSet,f.bulan)}</select>
      <span class="lbl">Status</span><select id="fStatus">${opt(statusOpts,f.status)}</select>
      <span class="tag">${rows.length} / ${D.detail.length} milestone</span>
    </div>
    <div class="tablewrap"><table>
      <thead><tr><th>Brand</th><th id="thCard" style="cursor:pointer;user-select:none">Card / Agenda <span style="opacity:.6">${sortArrow}</span></th><th>Subtask</th><th>Bulan</th><th>Deadline</th><th>Sisa Hari</th><th>Status</th><th>PIC</th></tr></thead>
      <tbody>${tb}</tbody></table></div>`;
  $('#fBrand').onchange=e=>{f.brand=e.target.value;renderAgenda();};
  $('#fBulan').onchange=e=>{f.bulan=e.target.value;renderAgenda();};
  $('#fStatus').onchange=e=>{f.status=e.target.value;renderAgenda();};
  $('#thCard').onclick=()=>{ agendaSort = agendaSort===1 ? -1 : (agendaSort===-1 ? 0 : 1); renderAgenda(); };
}

/* ══════════ INSIGHT OTOMATIS (rule-based — tanpa API, gratis) ══════════
   Merangkum data yang SUDAH ter-generate (Agenda, Sosmed, Inquiry, Anggaran)
   jadi 3 kelompok: sudah jalan / perlu perhatian / butuh aksi.
   Semua angka dihitung dari data — deterministik, hasil sama untuk data sama.
   Read-only: TIDAK mengisi Analisa Kualitatif (itu tetap ditulis brand).
   Blok ini identik di nrn-inquiry-form & nrn-dashboard — kalau diubah,
   ubah di dua-duanya. */
const INS = { erLow:1, erGood:3, reachDrop:20, doneGood:80, doneLow:50,
              convLow:10, convGood:25, cancelHigh:40,
              quoStale:30, sampStale:45, overspend:110, underspend:50 };
const insEsc = s => String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const insPct = (a,b) => b ? (a/b*100) : 0;
const insR   = v => Math.round(v);
// Umur (hari) dari string tanggal; toleran thd 'yyyy-MM-dd' & 'dd MMM yyyy'.
function insAge(s){
  if(!s) return null;
  const d = new Date(String(s).replace(' ','T'));
  const d2 = isNaN(d.getTime()) ? new Date(String(s)) : d;
  if(isNaN(d2.getTime())) return null;
  return Math.floor((Date.now()-d2.getTime())/86400000);
}

// D = { brand, month, prevM, nextM, bCur{est,proj,act}, bNext, so{reach,views,follows,er}, sp,
//       ag[], agDone, agProg, agLabel(fn), inqAll[], inqQuo[], inqSamp[], inqDeal[], inqCancel[] }
function buildInsight(D){
  const S=[], W=[], A=[];
  const put=(g,scope,txt)=>g.push({scope,txt});

  /* ── Anggaran ── */
  const b = D.bCur;
  if(!b.est && !b.proj && !b.act){
    put(A,'Anggaran',`Belum ada data anggaran ${D.month} sama sekali — cek apakah card Trello bulan ini sudah punya <code>Estimated Budget:</code> dan nominal <code>(Rp ...)</code> di checklist.`);
  } else {
    if(!b.est && b.proj)
      put(A,'Anggaran',`Proyeksi ${fmtRp(b.proj)} sudah jalan tapi <b>Budget Estimasi masih kosong</b>. Isi <code>Estimated Budget:</code> di deskripsi card supaya estimasi tidak terlewat.`);
    if(b.est && b.proj > b.est*1.2)
      put(W,'Anggaran',`Proyeksi ${fmtRp(b.proj)} melampaui estimasi ${fmtRp(b.est)} (+${insR(insPct(b.proj-b.est,b.est))}%) — rencana membengkak dari patokan awal.`);
    if(b.proj){
      const sp = insPct(b.act,b.proj);
      if(sp > INS.overspend)
        put(A,'Anggaran',`Aktual ${fmtRp(b.act)} = <b>${insR(sp)}% dari proyeksi</b> (lebih ${fmtRp(b.act-b.proj)}). Perlu penjelasan overspend.`);
      else if(sp < INS.underspend)
        put(W,'Anggaran',`Serapan baru ${insR(sp)}% dari proyeksi (${fmtRp(b.act)} dari ${fmtRp(b.proj)}) — banyak rencana belum jalan atau belum dicatat.`);
      else
        put(S,'Anggaran',`Aktual ${fmtRp(b.act)} terkendali di ${insR(sp)}% proyeksi.`);
    }
    if(!D.bNext.proj)
      put(A,'Anggaran',`Belum ada proyeksi untuk ${D.nextM}. Isi nominal <code>(Rp ...)</code> di checklist card bulan depan supaya bisa diantisipasi.`);
    else
      put(S,'Anggaran',`Proyeksi ${D.nextM} sudah terisi ${fmtRp(D.bNext.proj)}.`);
  }

  /* ── Agenda ── */
  const agT = D.ag.length;
  if(!agT){
    put(A,'Agenda',`Belum ada agenda ${D.month} — brand belum planning di Trello untuk bulan ini.`);
  } else {
    const dr = insPct(D.agDone,agT);
    const overdue = D.ag.filter(x => D.agLabel(x.status)!=='Done' && x.sisaHari!=null && x.sisaHari<0);
    const belum = agT - D.agDone - D.agProg;
    if(dr >= INS.doneGood)      put(S,'Agenda',`${D.agDone}/${agT} agenda selesai (${insR(dr)}%) — eksekusi bulan ini rapi.`);
    else if(dr >= INS.doneLow)  put(W,'Agenda',`Baru ${D.agDone}/${agT} agenda Done (${insR(dr)}%), ${D.agProg} masih In Progress.`);
    else                        put(A,'Agenda',`Hanya ${D.agDone}/${agT} agenda Done (${insR(dr)}%) — eksekusi tertinggal jauh dari rencana.`);
    if(overdue.length){
      const s = overdue.slice(0,3).map(x=>insEsc(x.card||x.subtask)).join(', ');
      put(A,'Agenda',`<b>${overdue.length} task lewat deadline</b> & belum Done: ${s}${overdue.length>3?', …':''}.`);
    }
    if(belum>0) put(W,'Agenda',`${belum} agenda belum tersentuh — belum ada checklist yang mulai jalan.`);
  }

  /* ── Social Media ── */
  if(!D.so.reach && !D.so.views){
    put(A,'Sosmed',`Data sosmed ${D.month} belum masuk — performa belum bisa dinilai. Pastikan laporan bulanan sudah di-submit.`);
  } else {
    if(D.sp.reach){
      const rd = insPct(D.so.reach - D.sp.reach, D.sp.reach);
      if(rd <= -INS.reachDrop)
        put(A,'Sosmed',`Reach turun ${Math.abs(insR(rd))}% (${fmtNum(D.sp.reach)} → ${fmtNum(D.so.reach)}) — penurunan tajam, cek frekuensi & jenis konten.`);
      else if(rd < 0)
        put(W,'Sosmed',`Reach turun tipis ${Math.abs(insR(rd))}% vs ${D.prevM}.`);
      else
        put(S,'Sosmed',`Reach naik ${insR(rd)}% vs ${D.prevM} (${fmtNum(D.sp.reach)} → ${fmtNum(D.so.reach)}).`);
    }
    if(D.so.er){
      if(D.so.er < INS.erLow)        put(A,'Sosmed',`Avg ER ${D.so.er.toFixed(2)}% di bawah benchmark ${INS.erLow}% — konten kurang memicu interaksi.`);
      else if(D.so.er >= INS.erGood) put(S,'Sosmed',`Avg ER ${D.so.er.toFixed(2)}% sehat (di atas ${INS.erGood}%).`);
      else                           put(W,'Sosmed',`Avg ER ${D.so.er.toFixed(2)}% wajar tapi belum kuat (target >${INS.erGood}%).`);
      const ed = D.so.er - D.sp.er;
      if(D.sp.er && ed <= -0.5) put(W,'Sosmed',`ER turun ${Math.abs(ed).toFixed(2)}pp vs ${D.prevM} — engagement melemah walau reach mungkin naik.`);
    }
    if(D.sp.follows>0 && D.so.follows<=0) put(W,'Sosmed',`Follows ${D.month} ${fmtNum(D.so.follows)} — pertumbuhan follower berhenti.`);
  }

  /* ── Inquiry ── */
  const tot = D.inqAll.length;
  if(!tot){
    put(A,'Inquiry',`Belum ada inquiry tercatat — pipeline kosong, tidak ada yang bisa di-follow up.`);
  } else {
    const deal=D.inqDeal.length, cancel=D.inqCancel.length;
    const conv = insPct(deal,tot);
    const pipeArr = D.inqQuo.concat(D.inqSamp);
    const pipeRp  = pipeArr.reduce((s,x)=>s+(x.nominal||0),0);
    if(conv >= INS.convGood)     put(S,'Inquiry',`Konversi ${insR(conv)}% (${deal}/${tot} deal) — di atas target ${INS.convGood}%.`);
    else if(conv < INS.convLow)  put(A,'Inquiry',`Konversi hanya ${insR(conv)}% (${deal}/${tot} deal) — mayoritas inquiry tidak jadi, cek kualitas lead & follow up.`);
    else                         put(W,'Inquiry',`Konversi ${insR(conv)}% (${deal}/${tot} deal) — masih di bawah target ${INS.convGood}%.`);
    if(pipeArr.length)
      put(S,'Inquiry',`${pipeArr.length} inquiry masih berjalan senilai ${fmtRp(pipeRp)} — potensi closing yang perlu dikejar.`);
    if(cancel && insPct(cancel,tot) > INS.cancelHigh)
      put(W,'Inquiry',`Cancel ${insR(insPct(cancel,tot))}% (${cancel}/${tot}) — cek alasan cancel yang paling sering muncul.`);
    const stale = D.inqQuo.filter(x=>{ const a=insAge(x.tglQuotation); return a!=null && a>INS.quoStale; });
    if(stale.length)
      put(A,'Inquiry',`<b>${stale.length} quotation mengendap >${INS.quoStale} hari</b> tanpa maju ke sampling: ${stale.slice(0,3).map(x=>insEsc(x.customer)).join(', ')}${stale.length>3?', …':''}.`);
    const sStale = D.inqSamp.filter(x=>{ const a=insAge(x.tglSampling); return a!=null && a>INS.sampStale; });
    if(sStale.length)
      put(A,'Inquiry',`${sStale.length} sampling jalan >${INS.sampStale} hari belum closing: ${sStale.slice(0,3).map(x=>insEsc(x.customer)).join(', ')}${sStale.length>3?', …':''}.`);
  }

  return { sudah:S, perhatian:W, aksi:A };
}

// Renderer generik kotak insight — dipakai insight per-brand & lintas brand (dashboard).
function insightBoxHtml(title, headTxt, R, footTxt){
  const col = (t,cls,arr,empty) => `
    <div class="ins-col ${cls}">
      <h4>${t} <span class="ins-n">${arr.length}</span></h4>
      ${arr.length ? '<ul>'+arr.map(f=>`<li><span class="ins-tag">${f.scope}</span> ${f.txt}</li>`).join('')+'</ul>'
                   : `<div class="ins-empty">${empty}</div>`}
    </div>`;
  return `
    <div class="section-title">${title}</div>
    <div class="ins-box">
      <div class="ins-head">${headTxt}</div>
      <div class="ins-grid">
        ${col('✅ Sudah jalan','good',R.sudah,'Belum ada capaian yang tercatat bulan ini.')}
        ${col('⚠️ Perlu perhatian','warn',R.perhatian,'Tidak ada.')}
        ${col('🎯 Butuh aksi','act',R.aksi,'Tidak ada yang mendesak.')}
      </div>
      <div class="ins-foot">${footTxt}</div>
    </div>`;
}

function insightHtml(D){
  const R = buildInsight(D);
  return insightBoxHtml(
    '🤖 Ringkasan &amp; Saran Otomatis',
    `${D.brand?insEsc(D.brand)+' · ':''}${insEsc(D.month)} — ${R.sudah.length} berjalan baik · ${R.perhatian.length} perlu perhatian · ${R.aksi.length} butuh aksi`,
    R,
    'Dihitung otomatis dari Agenda, Sosmed, Inquiry &amp; Anggaran dengan ambang tetap — <b>bukan pengganti</b> Analisa Kualitatif di bawah. Sifatnya indikatif; keputusan tetap di brand.'
  );
}

/* ===== INQUIRY (rich, filter client-side) ===== */
// Normalisasi status → key (harus sama dgn inqStatusKey_ di backend & Brand Needs)
function inqKey(s){
  const z=String(s||'');
  if(z.indexOf('Deal')>=0) return 'deal';
  if(z.indexOf('Cancel')>=0) return 'cancel';
  if(z.toLowerCase().indexOf('sampling')>=0) return 'sampling';
  return 'quotation';
}
const INQ_LABEL={quotation:'📝 Quotation',sampling:'🔬 On going sampling',deal:'✅ Deal',cancel:'❌ Cancel'};
const INQ_CLASS={quotation:'wait',sampling:'sampling',deal:'deal',cancel:'cancel'};
function inqPill(st){ const k=inqKey(st); return '<span class="pill '+INQ_CLASS[k]+'">'+INQ_LABEL[k]+'</span>'; }
function renderInquiry(){
  const D = inqData.detail, f = inqFilt;
  const BR = ['Revolt Industry','Radja Leather','Rove Gifts','Winddam ID'];
  // summary per brand
  const cards = BR.map(b=>{
    const rows = D.filter(d=>d.brand===b);
    const by = k => rows.filter(d=>inqKey(d.status)===k);
    const deal=by('deal'), quo=by('quotation'), samp=by('sampling'), cancel=by('cancel');
    const nom = deal.reduce((s,d)=>s+d.nominal,0);
    return `<div class="bcard"><h3>${b}</h3>
      <div class="big">${rows.length}</div><div class="biglbl">Total Inquiry</div>
      <div class="statrow">
        <span class="chip prog">📝 ${quo.length}</span>
        <span class="chip samp">🔬 ${samp.length}</span>
        <span class="chip done">✅ ${deal.length}</span>
        <span class="chip plan">❌ ${cancel.length}</span>
      </div>
      <div style="margin-top:9px;font-family:'DM Mono',monospace;font-size:12px;color:var(--green4);font-weight:600">${fmtRp(nom)}<span style="color:var(--text3);font-weight:400"> deal</span></div>
    </div>`;
  }).join('');
  const brandOpts=['(Semua)'].concat(BR);
  const statusOpts=['(Semua)'].concat(['quotation','sampling','deal','cancel'].map(k=>INQ_LABEL[k]));
  const opt=(arr,sel)=>arr.map(v=>`<option ${v===sel?'selected':''}>${v}</option>`).join('');
  const rows = D.filter(d=>
    (f.brand==='(Semua)'||d.brand===f.brand)&&
    (f.status==='(Semua)'|| inqKey(f.status)===inqKey(d.status)));
  const tb = rows.length ? rows.map(d=>`
    <tr><td>${d.timestamp||'—'}</td><td><b>${d.brand}</b></td><td>${d.customer||'—'}</td><td>${d.product||'—'}</td>
    <td class="r num">${fmtRp(d.nominal)}</td><td>${d.contactVia||'—'}</td><td>${inqPill(d.status)}</td>
    <td>${d.tglQuotation||'—'}</td><td>${d.tglSampling||'—'}</td><td>${d.tglDeal||'—'}</td><td>${d.tglCancel||'—'}</td>
    <td class="muted">${d.alasanCancel||'—'}</td><td class="muted">${d.salesPic||'—'}</td></tr>`).join('')
    : '<tr><td colspan="13" class="muted" style="text-align:center;padding:24px">Tidak ada data.</td></tr>';
  $('#content').innerHTML = `
    <div class="section-title">📊 Summary Inquiry</div>
    <div class="brandgrid">${cards}</div>
    <div class="section-title">📑 Detail Inquiry</div>
    <div class="toolbar">
      <span class="lbl">Brand</span><select id="iBrand">${opt(brandOpts,f.brand)}</select>
      <span class="lbl">Status</span><select id="iStatus">${opt(statusOpts,f.status)}</select>
      <span class="tag">${rows.length} / ${D.length} inquiry</span>
    </div>
    <div class="tablewrap"><table>
      <thead><tr><th>Tanggal</th><th>Brand</th><th>Customer</th><th>Produk</th><th class="r">Est. Nominal</th><th>Via</th><th>Status</th><th>Tgl Quotation</th><th>Tgl Sampling</th><th>Tgl Deal</th><th>Tgl Cancel</th><th>Alasan Cancel</th><th>PIC</th></tr></thead>
      <tbody>${tb}</tbody></table></div>
    <div class="note" style="margin-top:10px;font-size:12px;color:var(--text3)">Tanggal tiap tahap diisi otomatis oleh sistem saat status pertama kali masuk tahap tersebut, lalu tidak berubah lagi (jejak timeline).</div>`;
  $('#iBrand').onchange=e=>{f.brand=e.target.value;renderInquiry();};
  $('#iStatus').onchange=e=>{f.status=e.target.value;renderInquiry();};
}

/* ===== FINANCE (rich, filter brand + range bulan) ===== */
function renderFinance(){
  const rows = finData.rows, f = finFilt;
  const fromIdx = f.from==='(Semua)' ? 0 : MONTHS.indexOf(f.from);
  const toIdx   = f.to==='(Semua)'   ? 11 : MONTHS.indexOf(f.to);
  const flt = rows.filter(r =>
    (f.brand==='(Semua)'||r.brand===f.brand) &&
    (MONTHS.indexOf(r.month)>=fromIdx && MONTHS.indexOf(r.month)<=toIdx));

  const sum = (arr,k)=>arr.reduce((s,x)=>s+(x[k]||0),0);
  const est=sum(flt,'est'), proj=sum(flt,'proj'), act=sum(flt,'act');
  const vEst=act-est, vProj=act-proj;
  const task=sum(flt,'taskCount'), done=sum(flt,'doneCount'), ovd=sum(flt,'overdueCount');
  const vcol=v=>v<=0?'var(--green4)':'var(--red)';

  const opt=(arr,sel)=>arr.map(v=>`<option ${v===sel?'selected':''}>${v}</option>`).join('');
  const brandOpts=['(Semua)'].concat(BR), monthOpts=['(Semua)'].concat(MONTHS);

  // Rincian Budget Estimasi per card (klik kartu Estimasi)
  const estDet = (finData.estDetail||[]).filter(d =>
    (f.brand==='(Semua)'||d.brand===f.brand) &&
    (MONTHS.indexOf(d.month)>=fromIdx && MONTHS.indexOf(d.month)<=toIdx));
  estDet.sort((a,b)=>(b.est||0)-(a.est||0));
  const estDetTotal = estDet.reduce((s,d)=>s+(d.est||0),0);
  const eRows = estDet.map(d=>
    `<tr><td>${d.card||'—'}</td><td>${d.brand}</td><td><b>${d.month||'—'}</b></td><td class="muted">${d.list||'—'}</td><td class="r num">${fmtRp(d.est)}</td></tr>`
  ).join('') || '<tr><td colspan="5" class="muted" style="text-align:center;padding:20px">Belum ada card dengan Estimated Budget untuk filter ini.</td></tr>';
  const estPanel = !estOpen ? '' : `
    <div class="section-title">🔎 Rincian Budget Estimasi — dari card mana saja</div>
    <div class="muted" style="margin:-4px 0 10px;font-size:12px">Diambil dari <b>Estimated Budget:</b> di deskripsi tiap card Trello, dihitung di bulan card berakhir.</div>
    <div class="tablewrap"><table><thead><tr><th>Card / Agenda</th><th>Brand</th><th>Bulan</th><th>List</th><th class="r">Estimasi</th></tr></thead><tbody>${eRows}<tr><td colspan="4" class="r"><b>Total</b></td><td class="r num"><b>${fmtRp(estDetTotal)}</b></td></tr></tbody></table></div>`;

  // KPI cards
  const cards = `
    <div class="bcard" id="estCard" style="cursor:pointer" title="Klik untuk lihat rincian per card"><h3>Budget Estimasi ${estOpen?'▲':'▼'}</h3><div class="big" style="font-size:22px">${fmtRp(est)}</div><div class="biglbl" style="margin:4px 0 0">klik lihat rincian</div></div>
    <div class="bcard"><h3>Proyeksi (Checklist)</h3><div class="big" style="font-size:22px">${fmtRp(proj)}</div></div>
    <div class="bcard"><h3>Budget Aktual</h3><div class="big" style="font-size:22px">${fmtRp(act)}</div></div>
    <div class="bcard"><h3>Variance (Akt − Est / Proy)</h3><div class="big" style="font-size:16px;color:${vcol(vEst)}">${fmtRp(vEst)}</div>
      <div class="muted" style="font-size:13px;margin-top:2px;color:${vcol(vProj)}">${fmtRp(vProj)} <span style="color:var(--muted)">vs Proyeksi</span></div></div>
    <div class="bcard"><h3>Task / Selesai / Overdue</h3><div class="statrow" style="margin-top:6px">
      <span class="chip plan">${task} task</span><span class="chip done">✓ ${done}</span><span class="chip cancel" style="background:var(--red-bg);color:var(--red)">⚠ ${ovd}</span></div></div>`;

  // Per brand table
  const brandsToShow = f.brand==='(Semua)' ? BR : [f.brand];
  const bRows = brandsToShow.map(b=>{
    const br = flt.filter(r=>r.brand===b);
    const e=sum(br,'est'), p=sum(br,'proj'), a=sum(br,'act');
    return `<tr><td><b>${b}</b></td><td class="r num">${fmtRp(e)}</td><td class="r num">${fmtRp(p)}</td><td class="r num">${fmtRp(a)}</td>
      <td class="r num" style="color:${vcol(a-e)}">${fmtRp(a-e)}</td>
      <td class="r num" style="color:${vcol(a-p)}">${fmtRp(a-p)}</td>
      <td class="r num">${sum(br,'contentOutput')}</td><td class="r num">${sum(br,'taskCount')}</td>
      <td class="r num" style="color:${sum(br,'overdueCount')>0?'var(--red)':'var(--green4)'}">${sum(br,'overdueCount')}</td></tr>`;
  }).join('');

  // Per month table
  const byMonth = {};
  flt.forEach(r=>{ (byMonth[r.month]=byMonth[r.month]||[]).push(r); });
  const mRows = Object.keys(byMonth).sort((a,b)=>MONTHS.indexOf(a)-MONTHS.indexOf(b)).map(m=>{
    const mr=byMonth[m];
    const e=sum(mr,'est'), p=sum(mr,'proj'), a=sum(mr,'act');
    return `<tr><td><b>${m}</b></td><td class="r num">${fmtRp(e)}</td><td class="r num">${fmtRp(p)}</td><td class="r num">${fmtRp(a)}</td>
      <td class="r num" style="color:${vcol(a-e)}">${fmtRp(a-e)}</td>
      <td class="r num" style="color:${vcol(a-p)}">${fmtRp(a-p)}</td>
      <td class="r num">${sum(mr,'contentOutput')}</td><td class="r num">${sum(mr,'taskCount')}</td></tr>`;
  }).join('') || '<tr><td colspan="8" class="muted" style="text-align:center;padding:20px">Belum ada data untuk filter ini.</td></tr>';

  // Rincian pengeluaran (per task + checklist) dari nominal checklist
  const cleanSub = s => String(s||'').replace(/^\s*\[[^\]]*\]\s*[-–—]?\s*/,'').replace(/\s*\(\s*rp[^)]*\)\s*$/i,'').trim();
  const detail = (finData.detail||[]).filter(d =>
    (f.brand==='(Semua)'||d.brand===f.brand) &&
    (MONTHS.indexOf(d.month)>=fromIdx && MONTHS.indexOf(d.month)<=toIdx));
  if(finCardSort!==0) detail.sort((a,b)=> finCardSort * String(a.card||'').localeCompare(String(b.card||'')));
  else detail.sort((a,b)=> (MONTHS.indexOf(a.month)-MONTHS.indexOf(b.month)) || a.brand.localeCompare(b.brand) || a.card.localeCompare(b.card));
  const finCardArrow = finCardSort===0 ? '↕' : (finCardSort===1 ? '▲' : '▼');
  const detailTotal = detail.reduce((s,d)=>s+(d.nominal||0),0);
  const dRows = detail.map(d=>
    `<tr><td><b>${d.month}</b></td><td>${d.brand}</td><td>${d.card}</td><td class="muted">${cleanSub(d.subtask)}</td><td class="dl">${d.deadline||'—'}</td><td class="r num">${fmtRp(d.nominal)}</td></tr>`
  ).join('') || '<tr><td colspan="6" class="muted" style="text-align:center;padding:20px">Belum ada nominal di checklist untuk filter ini.</td></tr>';

  $('#content').innerHTML = `
    <div class="toolbar">
      <span class="lbl">Brand</span><select id="cBrand">${opt(brandOpts,f.brand)}</select>
      <span class="lbl">Dari</span><select id="cFrom">${opt(monthOpts,f.from)}</select>
      <span class="lbl">Sampai</span><select id="cTo">${opt(monthOpts,f.to)}</select>
    </div>
    <div class="section-title">📊 Ringkasan ${finData.year}</div>
    <div class="muted" style="margin:-4px 0 10px;font-size:12px"><b>Estimasi</b> = patokan awal (tetap) · <b>Proyeksi</b> = rencana terkini dari checklist (bisa berubah) · <b>Aktual</b> = realisasi. Estimasi dihitung di bulan card berakhir.</div>
    <div class="brandgrid">${cards}</div>
    ${estPanel}
    <div class="section-title">🏢 Per Brand</div>
    <div class="tablewrap"><table><thead><tr><th>Brand</th><th class="r">Budget Est.</th><th class="r">Proyeksi</th><th class="r">Budget Aktual</th><th class="r">Var vs Est</th><th class="r">Var vs Proy</th><th class="r">Content</th><th class="r">Task</th><th class="r">Overdue</th></tr></thead><tbody>${bRows}</tbody></table></div>
    <div class="section-title">🧾 Rincian Pengeluaran (Proyeksi Checklist)</div>
    <div class="tablewrap"><table><thead><tr><th>Bulan</th><th>Brand</th><th id="thFinCard" style="cursor:pointer;user-select:none">Task / Card <span style="opacity:.6">${finCardArrow}</span></th><th>Checklist</th><th>Tanggal</th><th class="r">Nominal</th></tr></thead><tbody>${dRows}<tr><td colspan="5" class="r"><b>Total</b></td><td class="r num"><b>${fmtRp(detailTotal)}</b></td></tr></tbody></table></div>
    <div class="section-title">📅 Per Bulan</div>
    <div class="tablewrap"><table><thead><tr><th>Bulan</th><th class="r">Budget Est.</th><th class="r">Proyeksi</th><th class="r">Budget Aktual</th><th class="r">Var vs Est</th><th class="r">Var vs Proy</th><th class="r">Content</th><th class="r">Task</th></tr></thead><tbody>${mRows}</tbody></table></div>`;
  $('#cBrand').onchange=e=>{f.brand=e.target.value;renderFinance();};
  $('#cFrom').onchange=e=>{f.from=e.target.value;renderFinance();};

/* ===== LAPORAN BULANAN (gabungan) ===== */
let lapReport = null;

/* ══════════ ANALISA LINTAS BRAND (khusus dashboard BOD) ══════════
   Membandingkan 4 brand di bulan yang sama. Nilai utamanya: memisahkan
   masalah SISTEMIK (kena semua brand → kemungkinan faktor platform/pasar)
   dari masalah BRAND-SPECIFIC (cuma 1 brand → eksekusi brand itu). */
const XB = { gapConv:15, gapER:1.5, konsentrasi:60, systemic:0.6 };

// Metrik ringkas per brand untuk dibandingkan
function xbMetrics(D){
  const agT=D.ag.length;
  const tot=D.inqAll.length;
  const pipe=D.inqQuo.concat(D.inqSamp);
  return {
    brand:      D.brand,
    doneRate:   agT ? D.agDone/agT*100 : null,
    agT:        agT,
    reachDelta: D.sp.reach ? (D.so.reach-D.sp.reach)/D.sp.reach*100 : null,
    reach:      D.so.reach,
    er:         D.so.er || null,
    erDelta:    (D.so.er && D.sp.er) ? D.so.er-D.sp.er : null,
    conv:       tot ? D.inqDeal.length/tot*100 : null,
    inqTot:     tot,
    pipeRp:     pipe.reduce((s,x)=>s+(x.nominal||0),0),
    dealRp:     D.inqDeal.reduce((s,x)=>s+(x.nominal||0),0),
    est:        D.bCur.est, proj:D.bCur.proj, act:D.bCur.act,
    serapan:    D.bCur.proj ? D.bCur.act/D.bCur.proj*100 : null,
    kosong:     !agT && !D.so.reach && !tot && !D.bCur.proj,
  };
}

// L = [{D, R(buildInsight), M(xbMetrics)}], month = bulan laporan
function buildCrossInsight(L, month){
  const S=[], W=[], A=[];
  const put=(g,scope,txt)=>g.push({scope,txt});
  const ada = L.filter(x=>!x.M.kosong);
  const has = (k) => ada.filter(x=>x.M[k]!=null);
  const best=(k,arr)=>arr.slice().sort((a,b)=>b.M[k]-a.M[k])[0];
  const worst=(k,arr)=>arr.slice().sort((a,b)=>a.M[k]-b.M[k])[0];

  /* ── Kelengkapan data ── */
  const kosong = L.filter(x=>x.M.kosong);
  if(kosong.length)
    put(A,'Data',`<b>${kosong.length} brand belum ada data ${insEsc(month)}</b> sama sekali: ${kosong.map(x=>insEsc(x.M.brand)).join(', ')}. Laporan portfolio belum utuh.`);
  if(!ada.length){ return {sudah:S,perhatian:W,aksi:A}; }

  /* ── Sistemik vs brand-specific: Reach ── */
  const rd = has('reachDelta');
  if(rd.length >= 2){
    const turun = rd.filter(x=>x.M.reachDelta < 0);
    const rasio = turun.length / rd.length;
    if(rasio >= XB.systemic && turun.length >= 2)
      put(A,'Sosmed',`<b>Reach turun di ${turun.length}/${rd.length} brand</b> — pola serempak, kemungkinan faktor platform/musiman, bukan salah eksekusi satu brand. Perlu strategi konten level holding.`);
    else if(turun.length === 1)
      put(W,'Sosmed',`Reach turun hanya di <b>${insEsc(turun[0].M.brand)}</b> (${Math.round(turun[0].M.reachDelta)}%) sementara brand lain naik — isu spesifik brand itu, bukan platform.`);
    else if(!turun.length)
      put(S,'Sosmed',`Reach naik di semua ${rd.length} brand yang ada datanya — momentum portfolio positif.`);
  }

  /* ── Sistemik vs brand-specific: ER ── */
  const ed = has('erDelta');
  if(ed.length >= 2){
    const turun = ed.filter(x=>x.M.erDelta <= -0.3);
    if(turun.length/ed.length >= XB.systemic && turun.length >= 2)
      put(W,'Sosmed',`ER turun di ${turun.length}/${ed.length} brand — engagement melemah menyeluruh, evaluasi format konten lintas brand.`);
  }

  /* ── Gap ER antar brand ── */
  const er = has('er');
  if(er.length >= 2){
    const b=best('er',er), w=worst('er',er);
    if(b.M.er - w.M.er >= XB.gapER)
      put(W,'Sosmed',`Jarak ER lebar: <b>${insEsc(b.M.brand)} ${b.M.er.toFixed(2)}%</b> vs <b>${insEsc(w.M.brand)} ${w.M.er.toFixed(2)}%</b> (beda ${(b.M.er-w.M.er).toFixed(2)}pp). Cek apa yang dilakukan ${insEsc(b.M.brand)} dan tiru ke ${insEsc(w.M.brand)}.`);
  }

  /* ── Gap konversi antar brand ── */
  const cv = has('conv');
  if(cv.length >= 2){
    const b=best('conv',cv), w=worst('conv',cv);
    if(b.M.conv - w.M.conv >= XB.gapConv)
      put(A,'Inquiry',`Jarak konversi lebar: <b>${insEsc(b.M.brand)} ${Math.round(b.M.conv)}%</b> (${b.M.inqTot} inquiry) vs <b>${insEsc(w.M.brand)} ${Math.round(w.M.conv)}%</b> (${w.M.inqTot} inquiry) — beda ${Math.round(b.M.conv-w.M.conv)}pp. Sales process ${insEsc(w.M.brand)} perlu dibedah.`);
    else
      put(S,'Inquiry',`Konversi antar brand relatif rata (${Math.round(w.M.conv)}%–${Math.round(b.M.conv)}%) — tidak ada brand yang tertinggal jauh.`);
  }

  /* ── Anggaran portfolio ── */
  const tProj=ada.reduce((s,x)=>s+x.M.proj,0), tAct=ada.reduce((s,x)=>s+x.M.act,0), tEst=ada.reduce((s,x)=>s+x.M.est,0);
  if(tProj){
    const sp = tAct/tProj*100;
    if(sp > INS.overspend)      put(A,'Anggaran',`Portfolio overspend: aktual ${fmtRp(tAct)} = <b>${Math.round(sp)}% dari proyeksi</b> ${fmtRp(tProj)}.`);
    else if(sp < INS.underspend) put(W,'Anggaran',`Serapan portfolio baru ${Math.round(sp)}% (${fmtRp(tAct)} dari ${fmtRp(tProj)}) — banyak rencana belum jalan.`);
    else                         put(S,'Anggaran',`Serapan portfolio sehat di ${Math.round(sp)}% (${fmtRp(tAct)} dari ${fmtRp(tProj)}).`);
    // Konsentrasi anggaran
    const top = best('proj',ada);
    const share = top.M.proj/tProj*100;
    if(share >= XB.konsentrasi)
      put(W,'Anggaran',`<b>${Math.round(share)}% anggaran portfolio terpusat di ${insEsc(top.M.brand)}</b> (${fmtRp(top.M.proj)} dari ${fmtRp(tProj)}) — cek apakah alokasi ini disengaja.`);
  }
  const noEst = ada.filter(x=>!x.M.est && x.M.proj);
  if(noEst.length)
    put(A,'Anggaran',`${noEst.length} brand jalan tanpa Budget Estimasi: ${noEst.map(x=>insEsc(x.M.brand)).join(', ')} — estimasi terlewat saat bikin agenda.`);

  /* ── Eksekusi agenda antar brand ── */
  const dr = has('doneRate');
  if(dr.length >= 2){
    const b=best('doneRate',dr), w=worst('doneRate',dr);
    if(w.M.doneRate < INS.doneLow)
      put(A,'Agenda',`<b>${insEsc(w.M.brand)} paling tertinggal</b>: ${Math.round(w.M.doneRate)}% agenda Done (${w.M.agT} agenda), sementara ${insEsc(b.M.brand)} ${Math.round(b.M.doneRate)}%.`);
    else if(b.M.doneRate >= INS.doneGood)
      put(S,'Agenda',`Eksekusi terbaik: <b>${insEsc(b.M.brand)}</b> ${Math.round(b.M.doneRate)}% agenda Done.`);
  }

  /* ── Pipeline & deal portfolio ── */
  const tPipe=ada.reduce((s,x)=>s+x.M.pipeRp,0), tDeal=ada.reduce((s,x)=>s+x.M.dealRp,0);
  if(tPipe) put(S,'Inquiry',`Pipeline portfolio ${fmtRp(tPipe)} masih berjalan; deal masuk ${fmtRp(tDeal)} bulan ini.`);

  /* ── Brand yang paling butuh perhatian ── */
  const rank = L.slice().sort((a,b)=>b.R.aksi.length-a.R.aksi.length);
  if(rank[0] && rank[0].R.aksi.length >= 3)
    put(A,'Prioritas',`<b>${insEsc(rank[0].M.brand)} paling butuh perhatian</b> — ${rank[0].R.aksi.length} item butuh aksi (terbanyak di portfolio). Urutan berikutnya: ${rank.slice(1,3).map(x=>insEsc(x.M.brand)+' ('+x.R.aksi.length+')').join(', ')}.`);
  const bersih = L.filter(x=>!x.R.aksi.length && !x.M.kosong);
  if(bersih.length)
    put(S,'Prioritas',`${bersih.length} brand tanpa item mendesak: ${bersih.map(x=>insEsc(x.M.brand)).join(', ')} — bisa jadi acuan praktik baik.`);

  return {sudah:S, perhatian:W, aksi:A};
}

// Rakit semua data 1 brand untuk 1 bulan. Dipakai laporan per-brand & portfolio.
function lapBrandData(brand, month, prevM, nextM){
  const sumK=(a,k)=>a.reduce((s,x)=>s+(x[k]||0),0);
  const avgK=(a,k)=>a.length?a.reduce((s,x)=>s+(x[k]||0),0)/a.length:0;

  const ag = ((agendaData&&agendaData.detail)||[]).filter(x=>x.brand===brand && x.bulan===month);
  const agDone=ag.filter(x=>x.status==='Done').length, agProg=ag.filter(x=>x.status==='On Progress').length, agPlan=ag.length-agDone-agProg;

  const mkCur=((mktData&&mktData.rows)||[]).filter(r=>r.brand===brand && r.month===month);
  const mkPrv=((mktData&&mktData.rows)||[]).filter(r=>r.brand===brand && r.month===prevM);
  const so={reach:sumK(mkCur,'reach'),views:sumK(mkCur,'views'),follows:sumK(mkCur,'follows'),saves:sumK(mkCur,'saves'),er:avgK(mkCur,'avgER'),posts:sumK(mkCur,'posts')};
  const sp={reach:sumK(mkPrv,'reach'),views:sumK(mkPrv,'views'),follows:sumK(mkPrv,'follows'),saves:sumK(mkPrv,'saves'),er:avgK(mkPrv,'avgER')};

  const bud=a=>({est:sumK(a,'est'),proj:sumK(a,'proj'),act:sumK(a,'act')});
  const bCur=bud(((finData&&finData.rows)||[]).filter(r=>r.brand===brand && r.month===month));
  const bNext=bud(((finData&&finData.rows)||[]).filter(r=>r.brand===brand && r.month===nextM));

  const inq=((inqData&&inqData.detail)||[]).filter(x=>x.brand===brand);
  const inqQ=inq.filter(x=>inqKey(x.status)==='quotation');
  const inqS=inq.filter(x=>inqKey(x.status)==='sampling');
  const inqW=inq.filter(x=>inqKey(x.status)==='deal');
  const inqL=inq.filter(x=>inqKey(x.status)==='cancel');

  const insData = { brand, month, prevM, nextM, bCur, bNext, so, sp,
    ag, agDone, agProg, agLabel: statusLabel,
    inqAll:inq, inqQuo:inqQ, inqSamp:inqS, inqDeal:inqW, inqCancel:inqL };

  return { ag, agDone, agProg, agPlan, so, sp, bCur, bNext, inq, inqQ, inqS, inqW, inqL, insData };
}

/* ── View portfolio: ringkasan + perbandingan semua brand ── */
let lapPortfolio = null;
function renderPortfolio(month, year, prevM, nextM){
  const L = BR.map(b=>{
    const P = lapBrandData(b, month, prevM, nextM);
    return { brand:b, P, D:P.insData, R:buildInsight(P.insData), M:xbMetrics(P.insData) };
  });
  lapPortfolio = { month, year, list:L };

  const T = k => L.reduce((s,x)=>s+(x.M[k]||0),0);
  const tEst=T('est'), tProj=T('proj'), tAct=T('act'), tPipe=T('pipeRp'), tDeal=T('dealRp');
  const agTot=L.reduce((s,x)=>s+x.M.agT,0), agDone=L.reduce((s,x)=>s+x.P.agDone,0);
  const inqTot=L.reduce((s,x)=>s+x.M.inqTot,0), dealN=L.reduce((s,x)=>s+x.P.inqW.length,0);
  const erVals=L.filter(x=>x.M.er!=null);
  const avgER=erVals.length?erVals.reduce((s,x)=>s+x.M.er,0)/erVals.length:0;
  const tReach=L.reduce((s,x)=>s+x.M.reach,0);

  // Sorot nilai terbaik (hijau) & terburuk (merah) per kolom
  const pick=(k,dir)=>{ const v=L.filter(x=>x.M[k]!=null).map(x=>x.M[k]); if(v.length<2) return [null,null];
    return dir>0 ? [Math.max(...v), Math.min(...v)] : [Math.min(...v), Math.max(...v)]; };
  const cell=(val,k,fmt,dir)=>{
    if(val==null) return '<td class="r muted">—</td>';
    const [b,w]=pick(k,dir||1);
    const col = val===b ? 'var(--green4)' : val===w ? 'var(--red)' : '';
    return `<td class="r num" style="${col?'color:'+col+';font-weight:700':''}">${fmt(val)}</td>`;
  };
  const pc=v=>Math.round(v)+'%', pp=v=>v.toFixed(2)+'%', sg=v=>(v>=0?'+':'')+Math.round(v)+'%';

  const rows = L.map(x=>{
    const M=x.M;
    if(M.kosong) return `<tr><td><b>${M.brand}</b></td><td colspan="7" class="muted">Belum ada data ${month}</td></tr>`;
    return `<tr><td><b>${M.brand}</b></td>
      ${cell(M.doneRate,'doneRate',pc,1)}
      ${cell(M.reachDelta,'reachDelta',sg,1)}
      ${cell(M.er,'er',pp,1)}
      ${cell(M.conv,'conv',pc,1)}
      <td class="r num">${fmtRp(M.pipeRp)}</td>
      ${cell(M.serapan,'serapan',pc,-1)}
      <td class="r num" style="${x.R.aksi.length>=3?'color:var(--red);font-weight:700':''}">${x.R.aksi.length}</td></tr>`;
  }).join('');

  const X = buildCrossInsight(L, month);
  const opt=(arr,sel)=>arr.map(v=>`<option ${v===sel?'selected':''}>${v}</option>`).join('');

  $('#content').innerHTML = `
    <div class="toolbar">
      <span class="lbl">Brand</span><select id="lBrand">${opt([ALL_BRANDS].concat(BR), ALL_BRANDS)}</select>

function exportPortfolioExcel(){

    Brand:x.brand, 'Agenda Total':x.M.agT, 'Agenda Done %':n(x.M.doneRate),
    'Reach':x.M.reach, 'Reach Δ %':n(x.M.reachDelta), 'Avg ER %':n(x.M.er),
    'Inquiry':x.M.inqTot, 'Konversi %':n(x.M.conv), 'Pipeline':x.M.pipeRp, 'Deal Rp':x.M.dealRp,

    'Butuh Aksi':x.R.aksi.length, 'Perlu Perhatian':x.R.perhatian.length,
  }))), 'Perbandingan');
  const X=buildCrossInsight(L, month);
  const strip=s=>String(s).replace(/<[^>]+>/g,'');
  const flat=(arr,k)=>arr.map(f=>({Kelompok:k, Lingkup:f.scope, Temuan:strip(f.txt)}));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(
    flat(X.sudah,'Sudah jalan').concat(flat(X.perhatian,'Perlu perhatian'), flat(X.aksi,'Butuh aksi'))), 'Analisa Lintas Brand');

    L.flatMap(x=>x.R.aksi.map(f=>({Brand:x.brand, Lingkup:f.scope, Aksi:strip(f.txt)})))), 'Aksi per Brand');

}

/* ===== GENERIC GRID (fallback) ===== */
const isNum = s => /^[-+]?(rp\.?\s*)?[\d.,]+%?$/i.test(String(s).trim()) && /\d/.test(String(s));
const isEmptyRow = row => row.every(c => String(c).trim()==='');
const nonEmpty = row => row.filter(c => String(c).trim()!=='').length;

function pillize(s){
  const z = String(s).toLowerCase();
  if(z.includes('deal')) return '<span class="pill deal">'+s+'</span>';
  if(z.includes('cancel')) return '<span class="pill cancel">'+s+'</span>';
  if(z.includes('sampling')) return '<span class="pill sampling">'+s+'</span>';
  if(z.includes('quotation')||z.includes('wait')) return '<span class="pill wait">'+s+'</span>';
  if(z==='done') return '<span class="pill done">'+s+'</span>';
  if(z==='on progress') return '<span class="pill prog">'+s+'</span>';
  if(z==='planned') return '<span class="pill plan">'+s+'</span>';
  return s;
}

function renderGrid(values){
  if(!values || !values.length){ $('#content').innerHTML='<div class="loading">Sheet kosong.</div>'; return; }
  const maxC = Math.max(...values.map(r=>r.length));
  let html = ''; let tableRows = [];

  const flush = () => {
    if(!tableRows.length) return;
    // baris pertama blok = header
    const head = tableRows[0];
    const body = tableRows.slice(1);
    const ths = head.map((c,i)=>`<th class="${isNum(body.find(r=>r[i])? '' : '')||''}">${c||''}</th>`).join('');
    const trs = body.map(r=>'<tr>'+r.map(c=>{
      const v = String(c);
      const cls = isNum(v)?'r num':'';
      return `<td class="${cls}">${pillize(v)}</td>`;
    }).join('')+'</tr>').join('');
    html += `<div class="tablewrap"><table><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table></div>`;
    tableRows = [];
  };

  values.forEach(row => {
    if(isEmptyRow(row)){ flush(); return; }
    const ne = nonEmpty(row);
    const firstCell = String(row.find(c=>String(c).trim()!=='')||'');
    if(ne===1){
      // banner / sub-judul
      flush();
      const big = /DASHBOARD|AGENDA|SUMMARY|RINGKASAN|HOLDING/i.test(firstCell) || firstCell.length>30;
      html += `<div class="${big?'gbanner':'gsub'}">${firstCell}</div>`;
    } else {
      tableRows.push(row.map(c=>String(c)));
    }
  });
  flush();
  $('#content').innerHTML = html || '<div class="loading">Tidak ada data.</div>';
}
